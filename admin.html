    return '<button onclick="event.stopPropagation();openDetailByRno(\''+esc(rno)+'\');" '
      +'style="padding:4px 10px;font-size:11px;font-weight:700;color:#166534;'
      +'background:rgba(22,101,52,0.08);border:1px solid rgba(22,101,52,0.25);border-radius:6px;cursor:pointer;">👁 상세</button>';
  }

  function makeCards(list) {
    if(!list.length) return '<div class="miss-empty">✅ 누락 없음</div>';
    return list.map(function(d, i){
      var youth = isYouth(d);
      var grade = youthGrade(d);
      var numBg = youth ? 'linear-gradient(135deg,#f07000,#c85000)' : 'linear-gradient(135deg,#e03030,#b01010)';
      return '<div class="miss-card" onclick="openMissDetail(&apos;'+esc(d.rno)+'&apos;)">'
        +'<div class="miss-num" style="background:'+numBg+';">'+(youth?'🎒':'')+(i+1)+'</div>'
        +'<div class="miss-info">'
        +'<div class="miss-name">'
        +(youth?'🎒 ':'')
        +esc(d.name)
        +(grade?'<span style="font-size:10px;padding:1px 6px;border-radius:4px;background:rgba(255,140,0,0.12);color:#b85c00;border:1px solid rgba(255,140,0,0.25);font-weight:700;margin-left:5px;">'+esc(grade)+'</span>':'')
        +(d.gender?' ('+esc(d.gender)+')':'')+(d.ids?' · '+esc(d.ids):'')+'</div>'
        +'<div class="miss-sub">'+esc(d.pastor||'-')+' / '+esc(d.moksang||'-')+' · '+esc(d.mteam||'-')+'</div>'
        +'</div>'
        +'<div class="miss-rno">'+esc(d.rno)+'</div>'
        +editBtn(d.rno)
        +'</div>';
    }).join('');
  }

  // 주민번호 형식/성별 불일치 카드 (사유 표시 포함)
  function makeIssueCards(list) {
    if(!list.length) return '<div class="miss-empty">✅ 오류 없음</div>';
    return list.map(function(d, i){
      return '<div class="miss-card" onclick="openMissDetail(&apos;'+esc(d.rno)+'&apos;)">'
        +'<div class="miss-num" style="background:linear-gradient(135deg,#e03030,#b01010);">'+(i+1)+'</div>'
        +'<div class="miss-info">'
        +'<div class="miss-name">'+esc(d.name)+(d.gender?' ('+esc(d.gender)+')':'')+(d.ids?' · '+esc(d.ids):'')+'</div>'
        +'<div class="miss-sub">'+esc(d.pastor||'-')+' / '+esc(d.moksang||'-')+'  ·  주민번호: '+esc(d.ssn||'-')+'</div>'
        +'<div class="miss-sub" style="color:var(--red);font-weight:700;">⚠️ '+esc(d.ssnIssue)+'</div>'
        +'</div>'
        +'<div class="miss-rno">'+esc(d.rno)+'</div>'
        +editBtn(d.rno)
        +'</div>';
    }).join('');
  }

  // 이름 중복 그룹 (이름 기준 오름차순)
  var nameMap = {};
  allData.forEach(function(d){
    var key = (d.name||'').trim();
    if(!key) return;
    if(!nameMap[key]) nameMap[key]=[];
    nameMap[key].push(d);
  });
  var dupGroups = Object.keys(nameMap)
    .filter(function(k){ return nameMap[k].length > 1; })
    .sort();

  // 두 항목 간 다른 필드 찾기
  var DUP_CHECK_KEYS = ['moksang','mteam','sched','trans','accom','village','pastor'];
  var DUP_CHECK_LABELS = {'moksang':'목장','mteam':'사역팀','sched':'일정','trans':'차량','accom':'숙소','village':'마을','pastor':'목자'};
  function diffFields(members) {
    var diffs = [];
    DUP_CHECK_KEYS.forEach(function(k){
      var vals = members.map(function(m){ return m[k]||'-'; });
      var unique = vals.filter(function(v,i,a){ return a.indexOf(v)===i; });
      if(unique.length > 1) diffs.push(DUP_CHECK_LABELS[k]);
    });
    return diffs;
  }
  var DUP_CHECK_ALL_LABEL = DUP_CHECK_KEYS.map(function(k){ return DUP_CHECK_LABELS[k]; }).join('·');

  var dupHtml = '';
  if(dupGroups.length === 0){
    dupHtml = '<div class="miss-empty">✅ 중복 이름 없음</div>';
  } else {
    dupGroups.forEach(function(name){
      var members = nameMap[name].slice().sort(function(a,b){
        return (a.submitAt||'').localeCompare(b.submitAt||'');
      });
      var diffs = diffFields(members);

      dupHtml += '<div class="dup-group">'
        +'<div class="dup-group-hd">👤 '+esc(name)
        +' <span style="font-size:10px;background:rgba(180,80,20,0.12);color:#8a3800;border:1px solid rgba(180,80,20,0.2);border-radius:8px;padding:1px 7px;">'+members.length+'건</span>'
        +(diffs.length
          ? ' <span style="font-size:10px;color:rgba(80,90,130,0.6);font-weight:400;">차이: '+diffs.join(' · ')+'</span>'
          : ' <span style="font-size:10px;color:rgba(150,50,50,0.7);font-weight:400;">⚠️ 완전 중복 ('+DUP_CHECK_ALL_LABEL+' 모두 동일)</span>')
        +'</div>';

      members.forEach(function(d){
        var ids = d.ids ? ' ('+d.ids+')' : '';
        var date = (d.submitAt||'').substring(5,10).replace('-','/'); // MM/DD

        // 각 행의 차이 필드 값만 강조해서 표시
        var diffVals = [];
        if(diffs.indexOf('목장')  >=0 && d.moksang) diffVals.push({label:'목장', val:d.moksang});
        if(diffs.indexOf('사역팀')>=0 && d.mteam)   diffVals.push({label:'사역팀', val:d.mteam});
        if(diffs.indexOf('일정')  >=0 && d.sched)   diffVals.push({label:'일정', val:d.sched});
        if(diffs.indexOf('차량')  >=0 && d.trans)   diffVals.push({label:'차량', val:d.trans});
        if(diffs.indexOf('숙소')  >=0 && d.accom)   diffVals.push({label:'숙소', val:d.accom});
        if(diffs.indexOf('마을')  >=0 && d.village) diffVals.push({label:'마을', val:d.village});
        if(diffs.indexOf('목자')  >=0 && d.pastor)  diffVals.push({label:'목자', val:d.pastor});

        // 요약 줄: 이름(식별) - 목장명 - 등록일 - [차이항목들]
        var summaryParts = [
          '<span style="font-weight:700;color:#1a1e3a;">'+esc(d.name)+esc(ids)+'</span>',
          '<span style="color:rgba(60,70,110,0.8);">'+esc(d.moksang||'-')+'</span>',
          '<span style="color:rgba(100,110,150,0.7);">'+esc(date)+'</span>'
        ];
        diffVals.forEach(function(df){
          summaryParts.push(
            '<span style="background:rgba(180,80,20,0.1);color:#8a3800;border:1px solid rgba(180,80,20,0.2);'
            +'border-radius:4px;padding:1px 6px;font-size:10px;font-weight:700;">'+esc(df.label)+': '+esc(df.val)+'</span>'
          );
        });

        dupHtml += '<div class="dup-row" id="duprow-'+esc(d.rno)+'">'
          +'<div class="dup-chk" id="dupchk-'+esc(d.rno)+'" onclick="toggleDupChk(&apos;'+esc(d.rno)+'&apos;)"></div>'
          +'<div class="dup-info" style="flex:1;">'
          +'<div style="display:flex;align-items:center;gap:6px;flex-wrap:wrap;">'
          +summaryParts.join('<span style="color:rgba(150,160,180,0.5);font-size:11px;">—</span>')
          +(isYouth(d)?'<span style="font-size:10px;padding:1px 5px;border-radius:3px;background:rgba(255,140,0,0.12);color:#b85c00;border:1px solid rgba(255,140,0,0.2);font-weight:700;">🎒'+esc(youthGrade(d))+'</span>':'')
          +'</div>'
          +'<div style="font-size:10px;color:rgba(100,110,150,0.6);margin-top:3px;">'+esc(d.rno)+'</div>'
          +'</div>'
          +detailBtn(d.rno)
          +'</div>';
      });
      dupHtml += '</div>';
    });
  }
  // ── 가족매칭 보류목록 섹션 ──
  var holdHtml = '';
  if(!holdData||holdData.length===0){
    holdHtml = '<div class="miss-empty">✅ 보류 항목 없음</div>';
  } else {
    // 같은 rno가 여러 구분으로 등록된 경우 모두 표시
    holdHtml = holdData.map(function(h,i){
      var typeColor = h.type.indexOf('중복')>=0||h.type.indexOf('이상')>=0
        ? '#b01010' : '#8a3800';
      var typeBg = h.type.indexOf('중복')>=0||h.type.indexOf('이상')>=0
        ? 'rgba(180,16,16,0.08)' : 'rgba(180,80,20,0.08)';
      return '<div class="miss-card" onclick="openMissDetail(&apos;'+esc(h.rno)+'&apos;)">'
        +'<div class="miss-num" style="background:linear-gradient(135deg,#8a3800,#6a2800);">'+(i+1)+'</div>'
        +'<div class="miss-info" style="flex:1;">'
        +'<div class="miss-name">'+esc(h.name)
          +(h.rno?'<span style="font-size:10px;color:#888;font-weight:400;margin-left:6px;">'+esc(h.rno)+'</span>':'')
          +'</div>'
        +'<div class="miss-sub" style="margin-top:3px;">'
          +'<span style="background:'+typeBg+';color:'+typeColor+';border:1px solid '+typeBg+';'
          +'border-radius:4px;padding:1px 6px;font-size:10px;font-weight:700;">'+esc(h.type)+'</span>'
          +'</div>'
        +'<div class="miss-sub" style="margin-top:4px;color:#666;font-size:11px;">'+esc(h.detail)+'</div>'
        +'</div>'
        +editBtn(h.rno)
        +'</div>';
    }).join('');
  }

  // ── 납부 이름 중복 감지 ──
  var payNameMap = {};
  allData.forEach(function(d){
    var key = (d.name||'').trim();
    if(!key) return;
    if(!payNameMap[key]) payNameMap[key] = [];
    payNameMap[key].push(d);
  });
  var payDupGroups = Object.keys(payNameMap).filter(function(name){
    var members = payNameMap[name];
    if(members.length < 2) return false;
    return members.some(function(m){ return payData[m.rno] && payData[m.rno].status; });
  }).sort();
  var payDupHtml = '';
  if(payDupGroups.length === 0){
    payDupHtml = '<div class="miss-empty">✅ 납부 이름 중복 없음</div>';
  } else {
    var stLabel = function(st){ return st==='paid'?'✅ 납부':st==='exempt'?'🔖 면제':'⬜ 미납'; };
    var stColor = function(st){ return st==='paid'?'#2e7d32':st==='exempt'?'#7b1fa2':'#9e9e9e'; };
    payDupGroups.forEach(function(name){
      var members = payNameMap[name].slice().sort(function(a,b){ return (a.submitAt||'').localeCompare(b.submitAt||''); });
      payDupHtml += '<div class="dup-group"><div class="dup-group-hd">👤 '+esc(name)
        +' <span style="font-size:10px;background:rgba(198,40,40,0.12);color:#c62828;border:1px solid rgba(198,40,40,0.25);border-radius:8px;padding:1px 7px;">'+members.length+'건</span></div>';
      members.forEach(function(d){
        var pay=payData[d.rno]||{}, st=pay.status||'unpaid';
        var payDate=pay.date?pay.date.slice(5).replace('-','/').replace(/^0(\d)/,'$1'):'';
        payDupHtml += '<div class="dup-row"><div class="dup-info" style="flex:1;">'
          +'<div style="display:flex;align-items:center;gap:6px;flex-wrap:wrap;">'
          +'<span style="font-weight:700;color:#1a1e3a;">'+esc(d.name)+'</span>'
          +'<span style="color:rgba(60,70,110,0.8);">'+esc(d.moksang||'-')+'</span>'
          +'<span style="color:rgba(100,110,150,0.7);">'+esc(d.village||'-')+'</span>'
          +'<span style="font-weight:700;color:'+stColor(st)+';">'+stLabel(st)+(payDate?' ('+payDate+')':'')+'</span>'
          +(d.phone?'<span style="font-size:10px;color:rgba(80,90,130,0.7);">📞 '+esc(d.phone)+'</span>':'')
          +'</div><div style="font-size:10px;color:rgba(100,110,150,0.6);margin-top:3px;">'+esc(d.rno)+'</div>'
          +'</div>'+detailBtn(d.rno)+editBtn(d.rno)+'</div>';
      });
      payDupHtml += '</div>';
    });
  }

  document.getElementById('missPanel').innerHTML =
    '<div style="padding:8px 0 12px;font-size:11px;font-weight:700;color:rgba(60,70,100,0.6);letter-spacing:1px;">총 '+allData.length+'명 · 확인 필요 항목</div>'
    +'<div class="dup-section"><div class="dup-sec-title">🔁 이름 중복 <span class="dup-count">'+dupGroups.length+'그룹</span></div>'+dupHtml+'</div>'
    +'<div class="dup-section" style="border:1px solid rgba(198,40,40,0.2);border-radius:10px;margin-bottom:10px;overflow:hidden;box-shadow:0 2px 8px rgba(198,40,40,0.06);">'
    +'<div class="dup-sec-title" style="background:#fdecea;color:#c62828;border-bottom:1px solid rgba(198,40,40,0.15);">💰 납부 이름 중복 <span class="dup-count" style="background:rgba(198,40,40,0.1);color:#c62828;border-color:rgba(198,40,40,0.25);">'+payDupGroups.length+'그룹</span></div>'
    +'<div style="padding:8px 14px;background:rgba(198,40,40,0.03);border-bottom:1px solid rgba(198,40,40,0.08);font-size:11px;color:rgba(150,30,30,0.75);">📋 납부 탭에서 동일 이름으로 복수 등록된 항목입니다. 수정 또는 중복 삭제 여부를 확인하세요</div>'
    +payDupHtml+'</div>'
    +'<div class="miss-section"><div class="miss-sec-title">⚠️ 주민등록번호 오류 의심 <span class="miss-count">'+ssnIssues.length+'명</span></div>'
    +'<div style="padding:8px 14px;background:rgba(32,80,200,0.04);border-bottom:1px solid rgba(32,80,200,0.08);font-size:11px;color:rgba(32,80,200,0.7);">📋 자릿수 오류 또는 주민번호-신청서 성별 불일치</div>'
    +makeIssueCards(ssnIssues)+'</div>'
    +'<div class="miss-section"><div class="miss-sec-title">⚠️ 주민등록번호 미등록 <span class="miss-count">'+noSsn.length+'명</span></div>'
    +'<div style="padding:8px 14px;background:rgba(32,80,200,0.04);border-bottom:1px solid rgba(32,80,200,0.08);font-size:11px;color:rgba(32,80,200,0.7);">📋 실제 번호는 구글시트에서 확인하세요</div>'
    +makeCards(noSsn)+'</div>'
    +'<div class="miss-section"><div class="miss-sec-title">⚠️ 전화번호 누락 <span class="miss-count">'+noPhone.length+'명</span></div>'+makeCards(noPhone)+'</div>'
    +'<div class="miss-section"><div class="miss-sec-title">👨‍👩‍👧 가족매칭 보류 <span class="miss-count">'+(holdData?holdData.length:0)+'건</span></div>'
    +'<div style="padding:8px 14px;background:rgba(138,56,0,0.04);border-bottom:1px solid rgba(138,56,0,0.1);font-size:11px;color:rgba(138,56,0,0.8);">📋 수동 확인 후 가족DB 시트에 직접 추가하거나 중복신청 건은 삭제하세요</div>'
    +holdHtml+'</div>'
    +'<div class="dup-del-bar" id="dupDelBar">'
    +'<button class="dup-cancel-btn" onclick="clearDupSel()">취소</button>'
    +'<button class="dup-del-btn" id="dupDelBtn" onclick="confirmDeleteDup()">선택 항목 삭제</button>'
    +'</div>';
}

// ── 중복 선택 상태 ──
var dupSelected = {};

function toggleDupChk(rno) {
  dupSelected[rno] = !dupSelected[rno];
  var chk = document.getElementById('dupchk-'+rno);
  var row = document.getElementById('duprow-'+rno);
  if(chk){
    chk.className = 'dup-chk'+(dupSelected[rno]?' checked':'');
    chk.innerHTML = dupSelected[rno]
      ? '<svg width="11" height="9" viewBox="0 0 11 9" fill="none"><path d="M1 4L4 7.5L10 1" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>'
      : '';
  }
  if(row) row.style.background = dupSelected[rno] ? 'rgba(180,80,20,0.06)' : '';
  updateDupBar();
}

function updateDupBar() {
  var selCount = Object.keys(dupSelected).filter(function(k){ return dupSelected[k]; }).length;
  var bar = document.getElementById('dupDelBar');
  var btn = document.getElementById('dupDelBtn');
  if(bar) bar.className = 'dup-del-bar'+(selCount>0?' show':'');
  if(btn) btn.textContent = selCount+'건 삭제하기';
}

function clearDupSel() {
  Object.keys(dupSelected).forEach(function(rno){
    dupSelected[rno] = false;
    var chk = document.getElementById('dupchk-'+rno);
    var row = document.getElementById('duprow-'+rno);
    if(chk){ chk.className='dup-chk'; chk.innerHTML=''; }
    if(row) row.style.background='';
  });
  updateDupBar();
}

function confirmDeleteDup() {
  var rnos = Object.keys(dupSelected).filter(function(k){ return dupSelected[k]; });
  if(!rnos.length) return;

  // ── 삭제 대상 중 납입 정보가 있는지 확인 ──
  var payMigrations = []; // { fromRno, toRno, pay }
  rnos.forEach(function(delRno) {
    var pay = payData[delRno];
    if(!pay || !pay.status || pay.status === 'unpaid') return; // 납입 정보 없으면 패스

    // 같은 이름의 생존자(삭제 안 되는 rno) 찾기
    var delMember = allData.find(function(d){ return d.rno === delRno; });
    if(!delMember) return;
    var survivors = allData.filter(function(d){
      return d.name === delMember.name && rnos.indexOf(d.rno) < 0; // 삭제 목록에 없는 동명인
    });
    if(!survivors.length) return;

    // 생존자 중 납입 정보가 없는 첫 번째에 복사 예약
    var target = survivors.find(function(s){ var p=payData[s.rno]; return !p||!p.status||p.status==='unpaid'; });
    if(!target) target = survivors[0]; // 모두 납입 정보 있으면 첫 번째에 덮어쓰기
    payMigrations.push({ fromRno: delRno, toRno: target.rno, toName: target.name, pay: pay });
  });

  // ── 확인 메시지 구성 ──
  var msg = rnos.length+'건을 구글시트에서 삭제합니다.\n이 작업은 되돌릴 수 없습니다.';
  if(payMigrations.length > 0) {
    msg += '\n\n💰 납입 정보 자동 복사 예정:';
    payMigrations.forEach(function(m){
      var st = m.pay.status==='paid'?'납부':m.pay.status==='exempt'?'면제':'미납';
      var dt = m.pay.date ? ' ('+m.pay.date.slice(5).replace('-','/')+')'  : '';
      msg += '\n  • '+st+dt+' → '+m.toName+' ('+m.toRno+')';
    });
  }
  if(!confirm(msg)) return;

  var btn = document.getElementById('dupDelBtn');
  if(btn){ btn.disabled=true; btn.textContent='처리 중...'; }

  // ── 납입 정보 복사 먼저 실행 (있을 경우) ──
  function doDelete() {
    var ps = 'data='+encodeURIComponent(JSON.stringify({
      action: 'deleteRows', rnos: rnos, pw: _pw, editor: (currentUser&&currentUser.name)||''
    }));
    fetch(GAS_URL,{method:'POST',headers:{'Content-Type':'application/x-www-form-urlencoded'},body:ps})
      .then(function(r){ return r.json(); })
      .then(function(data){
        if(data.result==='ok'){
          // 로컬 payData에도 반영
          rnos.forEach(function(rno){ delete payData[rno]; });
          alert('✅ '+data.deleted+'건이 삭제되었습니다.'+(payMigrations.length?' (납입 정보 복사 완료)':''));
          dupSelected={};
          loadData('miss');
        } else {
          alert('❌ 삭제 실패: '+(data.message||''));
          if(btn){ btn.disabled=false; btn.textContent='선택 항목 삭제'; }
        }
      })
      .catch(function(){
        alert('❌ 네트워크 오류가 발생했습니다.');
        if(btn){ btn.disabled=false; btn.textContent='선택 항목 삭제'; }
      });
  }

  if(payMigrations.length === 0) {
    doDelete();
    return;
  }

  // 납입 정보 복사: savePay 순차 호출
  var migDone = 0, migFail = 0;
  function nextMig(i) {
    if(i >= payMigrations.length) {
      if(migFail > 0) {
        alert('⚠️ 납입 정보 복사 '+migDone+'건 완료 / '+migFail+'건 실패\n삭제는 계속 진행합니다.');
      }
      doDelete();
      return;
    }
    var m = payMigrations[i];
    // 로컬 payData 업데이트
    payData[m.toRno] = Object.assign({}, m.pay);
    var toMember = allData.find(function(d){ return d.rno === m.toRno; });
    var rows = [{
      rno: m.toRno, name: toMember ? (toMember.name||'') : '',
      status: m.pay.status||'unpaid', amount: m.pay.amount||0,
      date: m.pay.date||'', memo: m.pay.memo||'',
      amount_calc: toMember ? getFee(toMember) : 100000
    }];
    fetch(GAS_URL, {
      method:'POST', headers:{'Content-Type':'application/x-www-form-urlencoded'},
      body:'data='+encodeURIComponent(JSON.stringify({ action:'savePay', pw:_pw, rows:rows }))
    })
    .then(function(r){ return r.json(); })
    .then(function(res){ if(res.result==='ok') migDone++; else migFail++; nextMig(i+1); })
    .catch(function(){ migFail++; nextMig(i+1); });
  }
  nextMig(0);
}

// ── 청소년 판별 (비고란 학년 또는 주민번호 추정) ──
function gradeFromSsn(ssn) {
  if (!ssn) return '';
  var s = ssn.replace(/[^0-9]/g, '');
  if (s.length < 7) return '';
  var yy = parseInt(s.slice(0, 2), 10);
  var g7 = parseInt(s[6], 10);
  var birthYear;
  if (g7 === 3 || g7 === 4) birthYear = 2000 + yy;
  else if (g7 === 1 || g7 === 2) birthYear = 1900 + yy;
  else return '';
  var schoolYear = new Date().getFullYear() - birthYear - 6;
  if (schoolYear < 1) return '유치';
  if (schoolYear <= 6) return '초' + schoolYear;
  if (schoolYear === 7) return '중1';
  if (schoolYear === 8) return '중2';
  if (schoolYear === 9) return '중3';
  return '';
}
function isYouth(d) {
  if (d.note && (/[초중고][0-9]/.test(d.note) || /유치|유아|어린이/.test(d.note))) return true;
  return !!gradeFromSsn(d.ssn);
}
function youthGrade(d) {
  if (d.note) {
    var m = d.note.match(/([초중고][0-9]|유치|유아|어린이)/);
    if (m) return m[0];
  }
  return gradeFromSsn(d.ssn);
}

// ── 납부 엑셀 내보내기 ──
function exportPayExcel() {
  var headers = ['관리번호','그룹번호','이름','성별','관계','마을','목장','사역팀','일정','차량','납부상태','납부금액','납입일','비고'];
  var rows = [];

  allData.forEach(function(d) {
    var pay  = payData[d.rno] || {};
    var st   = pay.status || 'unpaid';
    var stKo = st === 'paid' ? '납부' : st === 'exempt' ? '면제' : '미납';
    var amt  = st === 'paid' ? getFee(d) : (st === 'exempt' ? 0 : '');
    var date = pay.date ? pay.date.slice(5).replace('-', '/').replace(/^0(\d)/, '$1') : '';
    rows.push({
      '관리번호': d.rno,
      '그룹번호': d.gno,
      '이름':     d.name,
      '성별':     d.gender,
      '관계':     d.rel,
      '마을':     d.village || '',
      '목장':     d.moksang || '',
      '사역팀':   d.mteam   || '',
      '일정':     d.sched   || '',
      '차량':     d.trans   || '',
      '납부상태': stKo,
      '납부금액': amt !== '' ? amt : '',
      '납입일':   date,
      '비고':     d.note    || ''
    });
  });

  var ws = XLSX.utils.json_to_sheet(rows, { header: headers });

  // 열 너비 설정
  ws['!cols'] = [
    {wch:16},{wch:14},{wch:10},{wch:6},{wch:8},
    {wch:10},{wch:16},{wch:12},{wch:16},{wch:8},
    {wch:8},{wch:10},{wch:8},{wch:12}
  ];

  // 헤더 행 스타일 (배경색·굵게)
  var range = XLSX.utils.decode_range(ws['!ref']);
  for (var C = range.s.c; C <= range.e.c; C++) {
    var hdr = XLSX.utils.encode_cell({ r: 0, c: C });
    if (!ws[hdr]) continue;
    ws[hdr].s = {
      fill: { fgColor: { rgb: '1A3AB0' } },
      font: { bold: true, color: { rgb: 'FFFFFF' }, sz: 11 },
      alignment: { horizontal: 'center', vertical: 'center' }
    };
  }

  // 납부상태 셀 색상
  for (var R = 1; R <= range.e.r; R++) {
    var stCell = XLSX.utils.encode_cell({ r: R, c: 10 }); // 납부상태 열
    if (ws[stCell]) {
      var v = ws[stCell].v;
      var rgb = v === '납부' ? 'C8E6C9' : v === '면제' ? 'E1BEE7' : 'BBDEFB';
      ws[stCell].s = { fill: { fgColor: { rgb: rgb } }, alignment: { horizontal: 'center' } };
    }
    // 금액 오른쪽 정렬
    var amtCell = XLSX.utils.encode_cell({ r: R, c: 11 });
    if (ws[amtCell] && ws[amtCell].v !== '') {
      ws[amtCell].s = { alignment: { horizontal: 'right' } };
      ws[amtCell].t = 'n';
    }
  }

  var wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, ws, '납부현황');

  // 마을별 시트 추가
  var villages = [];
  allData.forEach(function(d){ if(d.village && villages.indexOf(d.village)<0) villages.push(d.village); });
  villages.sort().forEach(function(v) {
    var vRows = rows.filter(function(r){ return r['마을'] === v; });
    if (!vRows.length) return;
    var vws = XLSX.utils.json_to_sheet(vRows, { header: headers });
    vws['!cols'] = ws['!cols'];
    XLSX.utils.book_append_sheet(wb, vws, v);
  });

  var now = new Date();
  var ts  = now.getFullYear()
    + String(now.getMonth()+1).padStart(2,'0')
    + String(now.getDate()).padStart(2,'0');
  XLSX.writeFile(wb, 'MET2026_납부현황_' + ts + '.xlsx');
}

// gno가 2026-G로 시작하면 가족, 2026-A로 시작하면 개인
// 번호 prefix로 신청유형 판별
// 2026-A: 개인, 2026-F: 가족, 2026-G: 단체
function gnoType(gno){
  if(!gno) return 'individual';
  if(/^2026-F/i.test(gno)) return 'family';
  if(/^2026-G/i.test(gno)) return 'group';
  return 'individual';
}
function isGnoFamily(gno){ return /^2026-F/i.test(gno)||/^2026-G/i.test(gno); }
function isGnoGroup(gno){  return /^2026-G/i.test(gno); }

function buildGroups(data) {
  var seen={}, groups=[];
  data.forEach(function(d){
    var gno=d.gno||d.rno;
    if(seen[gno]) return;
    seen[gno]=true;
    // 가족(2026-G): gno 공유 멤버 전원, 개인(2026-A): 본인만
    var members = isGnoFamily(gno)
      ? allData.filter(function(x){ return x.gno===gno; })
      : [d];  // A: 개인, F: 가족, G: 단체
    members.sort(function(a,b){
      var relOrder={'본인':0,'배우자':1,'부모':2,'자녀':3,'기타':4,'-':5,'':5};
      var ra=relOrder[a.rel]!==undefined?relOrder[a.rel]:5;
      var rb=relOrder[b.rel]!==undefined?relOrder[b.rel]:5;
      if(ra!==rb) return ra-rb;
      var ga=(a.gender||'').indexOf('남')>=0?0:1;
      var gb=(b.gender||'').indexOf('남')>=0?0:1;
      return ga-gb;
    });
    // 대표의 명단 인덱스 (명단 번호순 정렬용)
    var repIdx=allData.indexOf(members[0]);
    groups.push({ gno:gno, members:members, idx:repIdx, isFamily:isGnoFamily(gno), isGroup:isGnoGroup(gno), appType:gnoType(gno) });
  });

  // ── 가족DB 기반 2차 병합: 서로 다른 gno라도 family_id가 같으면 한 그룹으로 합침 ──
  // (예: 개인으로 각자 신청한 부부가 가족DB에서 같은 family_id로 매칭된 경우)
  var byFamily={}, merged=[];
  groups.forEach(function(g){
    // family_id 병합은 단체(2026-G) 그룹 제외하고 적용 (개인/가족 모두 대상)
    if(g.isGroup){ merged.push(g); return; }
    var fid = g.members[0].family_id || '';
    if(!fid){ merged.push(g); return; }
    if(byFamily[fid]===undefined){
      byFamily[fid]=merged.length;
      merged.push({gno:g.gno, members:g.members.slice(), idx:g.idx, isFamily:true, isGroup:false, appType:g.appType, familyMerged:true});
    } else {
      var target=merged[byFamily[fid]];
      target.members=target.members.concat(g.members);
      if(g.idx<target.idx) target.idx=g.idx;
    }
  });
  groups=merged;
  groups.forEach(function(g){
    g.members.sort(function(a,b){
      var relOrder={'본인':0,'배우자':1,'부모':2,'자녀':3,'기타':4,'-':5,'':5};
      var ra=relOrder[a.rel]!==undefined?relOrder[a.rel]:5;
      var rb=relOrder[b.rel]!==undefined?relOrder[b.rel]:5;
      if(ra!==rb) return ra-rb;
      var ga=(a.gender||'').indexOf('남')>=0?0:1;
      var gb=(b.gender||'').indexOf('남')>=0?0:1;
      return ga-gb;
    });
  });

  // 명단 번호순 정렬
  groups.sort(function(a,b){ return a.idx-b.idx; });
  return groups;
}

    +'</tr></thead><tbody>';
  villages.forEach(function(v,vi){
    var mems=allData.filter(function(d){return d.village===v;});
    var vP=0,vU=0,vE=0,vA=0;
    mems.forEach(function(d){
      var st=(payData[d.rno]||{}).status||'unpaid';
      if(st==='paid'){vP++;vA+=getFee(d);}
      else if(st==='exempt') vE++;
      else vU++;
    });
    html+='<tr style="background:'+(vi%2===0?'#f7f9ff':'#fff')+';"><td class="grp">'+esc(v)+'</td>'
      +'<td class="cnt" style="font-size:13px;">'+mems.length+'</td>'
      +'<td style="text-align:center;font-weight:700;color:#14903c;">'+vP+'</td>'
      +'<td style="text-align:center;font-weight:700;color:var(--blue);">'+vU+'</td>'
      +'<td style="text-align:center;font-weight:600;color:#5030a0;">'+vE+'</td>'
      +'<td style="text-align:center;font-size:11px;font-weight:700;color:#1a3a9e;white-space:nowrap;">'+fmtWon(vA)+'</td></tr>';
  });
  html+='</tbody></table></div></div>';
  // 고정 검색창 표시
  document.getElementById('acctSearchWrap').style.display='';

  var si=document.getElementById('acctSearchInput'); if(si&&si!==document.activeElement) si.value=acctFilter.search;
  document.getElementById('acctContent').innerHTML=html;
}

function cyclePaySt(rno){

  var next=cur==='unpaid'?'paid':cur==='paid'?'exempt':'unpaid';
  setPaySt(rno,next);
}
function setPaySt(rno,st){

  payData[rno].status=st;
  if(st!=='paid'){

  savePayData(rno, prev);
  renderAcct();
}

var _spouseDropdownOpen = false;

function openSpouseDropdown() {
  var dd = document.getElementById('spouseDropdown');
  if (!dd) return;
  dd.style.display = 'block';
  _spouseDropdownOpen = true;
  var q = (document.getElementById('ef_spouse') || {}).value || '';
  renderSpouseList(q);
  setTimeout(function(){
    var si = document.getElementById('spouseSearchInput');
    if (si) { si.value = q; si.focus(); }
  }, 80);
}

function closeSpouseDropdown() {
  var dd = document.getElementById('spouseDropdown');
  if (dd) dd.style.display = 'none';
  _spouseDropdownOpen = false;
}

function filterSpouseDropdown(q) {
  var dd = document.getElementById('spouseDropdown');
  if (!dd || dd.style.display === 'none') return;
  // 두 입력란 동기화
  var si = document.getElementById('spouseSearchInput');
  var ei = document.getElementById('ef_spouse');
  if (document.activeElement === ei && si) si.value = q;
  renderSpouseList(q);
}

function renderSpouseList(q) {
  var listEl = document.getElementById('spouseDropdownList');
  if (!listEl) return;
  q = (q || '').trim();

  // 현재 수정 중인 본인 rno 제외
  var selfRno = _currentDetailRno;
  var candidates = allData.filter(function(d){ return d.rno !== selfRno; });

  // 검색어 있으면 필터, 없으면 전체
  if (q) {
    candidates = candidates.filter(function(d){
      return (d.name || '').indexOf(q) >= 0;
    });
  }

  if (!candidates.length) {
    listEl.innerHTML = '<div class="spouse-no-result">검색 결과가 없습니다</div>';
    return;
  }

  // 신청자 DB에 있는 사람 먼저, 나머지 뒤 (모두 allData 기반이므로 전부 신청자)
  // 이름 가나다순 정렬
  candidates.sort(function(a, b){
    return (a.name || '').localeCompare(b.name || '', 'ko');
  });

  var html = '';
  if (!q) html += '<div class="spouse-section-hd">📋 신청자 전체</div>';
  else html += '<div class="spouse-section-hd">🔍 "'+esc(q)+'" 검색 결과 '+candidates.length+'명</div>';

  candidates.forEach(function(d){
    var genderCls = (d.gender || '').indexOf('남') >= 0 ? 'm' : 'f';
    var genderLbl = (d.gender || '').indexOf('남') >= 0 ? '남' : '여';
    var sub = [d.moksang, d.village].filter(Boolean).join(' · ');
    html += '<div class="spouse-item" onclick="selectSpouse(\''+esc(d.name)+'\')">'
      + '<span class="spouse-item-gender '+genderCls+'">'+genderLbl+'</span>'
      + '<span class="spouse-item-name">'+esc(d.name)+'</span>'
      + '<span class="spouse-item-sub">'+esc(sub)+'</span>'
      + '</div>';
  });
  listEl.innerHTML = html;
}

function selectSpouse(name) {
  var ei = document.getElementById('ef_spouse');
  if (ei) ei.value = name;
  closeSpouseDropdown();
}

// 명단 수정 저장 성공 시, 숙소배치·차량배치에 영향 있는 항목이면 즉시 동기화 + 알림
var VEHACCOM_SYNC_FIELDS = ['사역팀','차량','숙소','이름','가족관계','배우자성명'];
function syncAccomVehAfterEdit(rno, changes){
  if(!changes || !changes.length) return;
  var relevant = changes.filter(function(c){ return VEHACCOM_SYNC_FIELDS.indexOf(c.field)>=0; });
  if(!relevant.length) return;

  var nameChange  = changes.find(function(c){ return c.field==='이름'; });
  var teamChange  = changes.find(function(c){ return c.field==='사역팀'; });
  var transChange = changes.find(function(c){ return c.field==='차량'; });
  var oldName = nameChange ? nameChange.before : null;
  var newName = nameChange ? nameChange.after  : null;

  // ── 차량배치 동기화 (이미 메모리에 로드된 경우에만) ──
  try{
    if(typeof vehLoaded!=='undefined' && vehLoaded){
      [1,2].forEach(function(bus){
        Object.keys(vehData[bus]||{}).forEach(function(seat){
          var occ = vehData[bus][seat];
          if(!occ) return;
          if(oldName && occ!==oldName) return;
          if(!oldName) return; // 이름변경이 아니면 occ 그대로 사용 (아래에서 처리)
          // 이름이 바뀐 경우: 좌석 점유자명 갱신
          vehData[bus][seat] = newName;
          if(vehMeta[occ]){ vehMeta[newName]=vehMeta[occ]; delete vehMeta[occ]; }
        });
        // 이름변경이 아닌 경우, 사역팀/차량 변경은 현재 이름 기준으로 처리
        var curName = newName || (allData.find(function(x){return x.rno===rno;})||{}).name;
        if(curName){
          Object.keys(vehData[bus]||{}).forEach(function(seat){
            if(vehData[bus][seat]!==curName) return;
            if(transChange && transChange.after!=='버스'){
              vehData[bus][seat]=''; // 더 이상 버스탑승 아님 → 좌석에서 제거
              delete vehMeta[curName];
            } else if(teamChange && vehMeta[curName]){
              vehMeta[curName].team = teamChange.after;
            }
          });
        }
      });
      if(typeof renderVeh==='function'){ try{ renderVeh(); }catch(e){} }
    }
  }catch(e){ console.log('[동기화] 차량배치 오류:', e.message); }

  // ── 숙소배치 동기화 (이름변경 시 회원목록 갱신 + 숙소필드 변경/명단기준 정리) ──
  var accomRemoved = null;
  try{
    if(typeof ACCOM_ROOMS!=='undefined'){
      if(oldName && newName){
        ACCOM_ROOMS.forEach(function(r){
          r.members = r.members.map(function(m){ return m===oldName ? newName : m; });
        });
      }
      var accomChange = changes.find(function(c){ return c.field==='숙소'; });
      var curName2 = newName || (allData.find(function(x){return x.rno===rno;})||{}).name;
      if(accomChange && curName2 && accomChange.after!=='단체(교회준비)'){
        ACCOM_ROOMS.forEach(function(r){
          var before=r.members.length;
          r.members = r.members.filter(function(m){ return m!==curName2; });
          if(r.members.length<before) accomRemoved = r.id;
        });
      }
      cleanAccomRooms();
      if(document.getElementById('accomPanel') && typeof renderAccomTable==='function'){
        try{ renderAccomTable(); }catch(e){}
      }
    }
  }catch(e){ console.log('[동기화] 숙소배치 오류:', e.message); }

  // ── 관리자 알림 ──
  var personLabel = newName || oldName || (allData.find(function(x){return x.rno===rno;})||{}).name || rno;
  var msgLines = relevant.map(function(c){ return '· '+c.field+': '+(c.before||'-')+' → '+(c.after||'-'); });
  if(accomRemoved) msgLines.push('· 숙소배치 '+accomRemoved+'번 방에서 자동 제외되었습니다.');
  alert('⚠️ '+personLabel+'님 정보 변경 — 숙소배치/차량배치에 영향이 있어 자동 반영했습니다.\n\n'+msgLines.join('\n')+'\n\n해당 탭에서 확인해주세요.');
}

function saveEdit() {
  if (!canEdit()) return;
  var rno = _currentDetailRno;
  if (!rno) return;

  var fields = {};
  var ssnError = '';
  EDIT_FIELD_DEFS.forEach(function(f){
    var el = document.getElementById('ef_'+f.key);
    if (!el) return;
    var v = el.value;
    if (f.key === 'ssnRaw') {
      v = v.replace(/[^0-9]/g,'');
      if (!v) return; // 비워두면 기존값 유지(전송 안 함)
      if (v.length !== 13) { ssnError = '주민등록번호는 13자리 숫자로 입력해주세요.'; return; }
      fields['주민등록번호'] = v.slice(0,6)+'-'+v.slice(6);
      return;
    }
    var header = EDIT_FIELD_TO_HEADER[f.key];
    if (!header) return;
    fields[header] = v;
  });

  if (ssnError) {
    document.getElementById('editMsg').textContent = ssnError;
    document.getElementById('editMsg').className = 'edit-msg error';
    return;
  }

  if (Object.keys(fields).length === 0) {
    document.getElementById('editMsg').textContent = '변경할 내용이 없습니다.';
    document.getElementById('editMsg').className = 'edit-msg';
    return;
  }

  var btn = document.getElementById('editSaveBtn');
  if (btn.disabled) return; // 이중 실행 방지
  btn.disabled = true; btn.textContent = '저장 중...';
  document.getElementById('editMsg').textContent = '';
  document.getElementById('editMsg').className = 'edit-msg';

  var editor = currentUser ? (currentUser.name + ':' + currentUser.phone) : '';
  var ps = 'data=' + encodeURIComponent(JSON.stringify({
    action: 'updateRow', rno: rno, fields: fields, pw: _pw, editor: editor
  }));

  fetch(GAS_URL, { method:'POST', headers:{'Content-Type':'application/x-www-form-urlencoded'}, body: ps })
    .then(function(r){ return r.json(); })
    .then(function(res){
      if (res.result === 'ok') {
        var n = res.updated || 0;
        if (n > 0) {
          // 저장 성공: 즉시 닫기
          var prevTab = _editFromTab || 'list';
          _editFromTab = null;
          closeEdit();
          document.getElementById('detailOvl').className = 'detail-ovl';
          document.body.style.position = '';
          document.body.style.top = '';
          document.body.style.left = '';
          document.body.style.right = '';
          document.body.style.width = '';
          window.scrollTo(0, _scrollY);
          try{ syncAccomVehAfterEdit(rno, res.changes||[]); }catch(e){ console.log('동기화 오류:', e.message); }
          loadData(prevTab);
        } else {
          btn.disabled = false; btn.textContent = '💾 저장';
          document.getElementById('editMsg').textContent = '변경된 내용이 없습니다.';
          document.getElementById('editMsg').className = 'edit-msg';
        }
      } else {
        btn.disabled = false; btn.textContent = '💾 저장';
        document.getElementById('editMsg').textContent = '저장 실패: ' + (res.message || '알 수 없는 오류');
        document.getElementById('editMsg').className = 'edit-msg error';
      }
    })
    .catch(function(e){
      btn.disabled = false; btn.textContent = '💾 저장';
      document.getElementById('editMsg').textContent = '네트워크 오류: ' + e.message;
      document.getElementById('editMsg').className = 'edit-msg error';
    });
}

function syncFamilyIdFromAdmin(){

  var btn = document.getElementById('syncFamilyBtn');

function renderFamily(){
  var panel = document.getElementById('familyPanel');
  if(!panel) return;

  // ── 1. family_id별 그룹핑 ──
  // family_id 있으면 해당 값으로, 없으면 개인(단독)으로 처리 (단독은 표시 안 함)
  var byFid = {};
  allData.forEach(function(d){
    var fid = d.family_id || '';
    if(!fid) return;
    if(!byFid[fid]) byFid[fid] = [];
    byFid[fid].push(d);
  });

  // ── 1-B. family_id 없어도 배우자성명 상호 매칭으로 가족그룹 구성 ──
  // A의 spouse = B.name  &&  B의 spouse = A.name  → 같은 그룹으로 묶음
  // 또는 A의 spouse = B.name만 있어도 B가 allData에 존재하면 묶음
  var spouseGrouped = {}; // rno → 합성 fid (spouse-RNOMIN_RNOMAX)
  allData.forEach(function(d){
    if(d.family_id) return; // family_id 있는 사람은 이미 위에서 처리됨
    if(spouseGrouped[d.rno]) return; // 이미 묶임
    var sp = (d.spouse || '').trim();
    if(!sp) return;
    // allData에서 이름이 일치하는 상대방 찾기
    var partner = allData.find(function(x){
      return x.rno !== d.rno && (x.name||'') === sp && !x.family_id;
    });
    if(!partner) return;
    if(spouseGrouped[partner.rno]) return;
    // 합성 fid: 두 rno를 정렬해 고유키 생성
    var ids = [d.rno, partner.rno].sort();
    var synFid = 'spouse-' + ids[0] + '_' + ids[1];
    spouseGrouped[d.rno] = synFid;
    spouseGrouped[partner.rno] = synFid;
    if(!byFid[synFid]) byFid[synFid] = [];
    byFid[synFid].push(d);
    byFid[synFid].push(partner);
  });

  // ── 2. 배우자성명 자동보완 맵 구성 ──
  Object.keys(byFid).forEach(function(fid){
    var members = byFid[fid];
    var couple = members.filter(function(m){
      return m.rel==='본인'||m.rel==='배우자'||m.rel==='-'||m.rel==='';
    });
    if(couple.length === 2){
      var m0 = couple[0], m1 = couple[1];
      if(!m0.spouse && m1.name){ m0._autoSpouse = m1.name; }
      if(!m1.spouse && m0.name){ m1._autoSpouse = m0.name; }
    }
  });

  var fids = Object.keys(byFid).sort();
  var totalFam = fids.length;
  var totalMem = allData.filter(function(d){ return !!d.family_id; }).length;
  var paidFam  = fids.filter(function(fid){
    return byFid[fid].every(function(m){ return (payData[m.rno]||{}).status==='paid'; });
  }).length;

  // ── 3. 통계 바 + 가족ID 일괄적용 버튼 ──
  var syncBtn = (currentUser&&currentUser.role==='super')
    ? '<div style="padding:0 0 10px;"><button id="syncFamilyBtn" onclick="syncFamilyIdFromAdmin()" style="width:100%;padding:11px;background:linear-gradient(135deg,#1a3a9e,#2050c8);border:none;border-radius:10px;color:#fff;font-size:13px;font-weight:700;cursor:pointer;font-family:inherit;touch-action:manipulation;">👨‍👩‍👧 가족ID 일괄적용 (배우자성명 기반)</button></div>'
    : '';
  var html = syncBtn + '<div class="fam-stat-bar">'
    + '<span class="fam-stat-chip">👨‍👩‍👧 가족그룹 '+totalFam+'팀</span>'
    + '<span class="fam-stat-chip">👥 가족참가 '+totalMem+'명</span>'
    + '</div>';

  // ── 4. 가족그룹 카드 ──
  fids.forEach(function(fid){
    var members = byFid[fid];
    // 구성원 정렬: 본인 → 배우자 → 부모 → 자녀 → 기타, 동일 관계 내 남→여
    var relOrder = {'본인':0,'배우자':1,'부모':2,'자녀':3,'기타':4,'-':5,'':5};
    members.sort(function(a,b){
      var ra=relOrder[a.rel]!==undefined?relOrder[a.rel]:5;
      var rb=relOrder[b.rel]!==undefined?relOrder[b.rel]:5;
      if(ra!==rb) return ra-rb;
      var ga=(a.gender||'').indexOf('남')>=0?0:1;
      var gb=(b.gender||'').indexOf('남')>=0?0:1;
      return ga-gb;
    });

    // 대표 목장 (첫 번째 멤버 기준)
    var rep = members[0];

    html += '<div class="fam-group">';
    // 해체 버튼: super 권한 + 실제 family_id 그룹만 (배우자 자동매칭 제외)
    var unlinkBtn = (canEdit() && fid.indexOf('spouse-') !== 0)
      ? '<button onclick="unlinkFamily(\''+esc(fid)+'\')" style="margin-left:auto;flex-shrink:0;padding:3px 10px;background:#fff;border:1.5px solid rgba(198,40,40,0.35);border-radius:6px;color:#c62828;font-size:10px;font-weight:700;cursor:pointer;font-family:inherit;touch-action:manipulation;">✂️ 해체</button>'
      : '';
    html += '<div class="fam-group-hd">'
      + '<span class="fam-group-id">'+(fid.indexOf('spouse-')===0?'💑 배우자매칭':esc(fid))+'</span>'
      + '<span class="fam-group-cnt">'+members.length+'명</span>'
      + (rep.moksang?'<span class="fam-group-moksang">'+esc(rep.moksang)+'</span>':'')
      + unlinkBtn
      + '</div>';

    members.forEach(function(m){
      var rel = m.rel||'-';
      var relCls = rel==='배우자'?'spouse':rel==='자녀'||rel==='부모'?'child':'';
      var spouseVal = m.spouse || m._autoSpouse || '';
      var spouseCls = (!m.spouse && m._autoSpouse) ? 'auto' : '';
      var spouseHint = spouseCls ? ' (자동)' : '';
      // 자녀 학년 표기
      var youth = isYouth(m);
      var grade = youth ? youthGrade(m) : '';
      var youthBadge = youth
        ? ' 🎒<span style="font-size:10px;font-weight:700;color:#b85c00;background:rgba(255,140,0,0.12);border:1px solid rgba(255,140,0,0.25);border-radius:4px;padding:1px 5px;margin-left:2px;">'+esc(grade)+'</span>'
        : '';
      var mteamVal = (m.mteam||'').trim();
      var mteamHtml = '<span style="font-size:9px;font-weight:700;color:#1565c0;background:rgba(21,101,192,0.08);border:1px solid rgba(21,101,192,0.2);border-radius:4px;padding:1px 5px;white-space:nowrap;flex-shrink:0;min-width:68px;max-width:90px;overflow:hidden;text-overflow:ellipsis;text-align:center;display:inline-block;">'+(mteamVal && mteamVal!=='-'?esc(mteamVal):'-')+'</span>';
      var transVal = (m.trans||'-').trim();
      var transStyle = transVal==='버스' ? 'color:#1b5e20;background:rgba(27,94,32,0.10);border:1px solid rgba(27,94,32,0.25);'
        : transVal==='자차' ? 'color:#1a3a9e;background:rgba(26,58,158,0.10);border:1px solid rgba(26,58,158,0.25);'
        : transVal==='동승' ? 'color:#6a1b9a;background:rgba(106,27,154,0.10);border:1px solid rgba(106,27,154,0.25);'
        : 'color:#555;background:rgba(0,0,0,0.06);border:1px solid rgba(0,0,0,0.15);';
      var transHtml = '<span style="font-size:9px;font-weight:700;border-radius:4px;width:28px;height:16px;line-height:16px;white-space:nowrap;flex-shrink:0;text-align:center;display:inline-block;box-sizing:border-box;'+transStyle+'">'+esc(transVal)+'</span>';

      var spouseToggle = '';
      if (spouseVal) {
        var sid = 'sp-' + esc(m.rno);
        spouseToggle = '<span class="fam-spouse-toggle" id="tgl-'+esc(m.rno)+'" onclick="toggleSpouse(\''+esc(m.rno)+'\')">💑 ›</span>'
          + '<span class="fam-member-spouse '+spouseCls+'" id="'+sid+'">'+esc(spouseVal)+spouseHint+'</span>';
      }

      html += '<div class="fam-member">'
        + '<span class="fam-member-rel '+relCls+'">'+(youth?'🎒 ':'')+esc(rel)+'</span>'
        + '<span class="fam-member-name">'+esc(m.name)+youthBadge+'</span>'
        + '<span class="fam-member-info">'+esc(m.gender||'-')+' · '+esc((m.sched||'-').replace(/\([^)]*\)/g,'').trim())+'</span>'
        + transHtml
        + mteamHtml
        + spouseToggle
        + '</div>';
    });

    html += '</div>'; // .fam-group
  });

  if(fids.length === 0){
    html += '<div class="fam-no-family">가족DB에 등록된 그룹이 없습니다.<br>가족DB 시트를 확인해주세요.</div>';
  }

  panel.innerHTML = html;
}

// ── 가족묶기 / 차량묶기 선택 모드 ──
// ══════════════════════════════════════════
var _selMode = false;
var _selRnos = {};
var _vehSelMode = false;
var _vehSelRnos = {};
var _longPressTimer = null;

function refreshSelModeClass() {
  document.getElementById('listWrap').classList.toggle('sel-mode-active', _selMode || _vehSelMode);
}

function enterSelMode(triggerRno) {
  if (_vehSelMode) exitVehSelMode();
  _selMode = true;
  _selRnos = {};
  refreshSelModeClass();
  if (triggerRno) toggleSelCard(triggerRno);
  updateSelBar();
}

function exitSelMode() {
  _selMode = false;
  _selRnos = {};
  document.querySelectorAll('.card.selected').forEach(function(c){ c.classList.remove('selected'); });
  refreshSelModeClass();
  updateSelBar();
}

function toggleSelCard(rno) {
  var card = document.getElementById('card-' + rno);
  if (!card) return;
  if (_selRnos[rno]) {
    delete _selRnos[rno];
    card.classList.remove('selected');
  } else {
    _selRnos[rno] = true;
    card.classList.add('selected');
  }
  updateSelBar();
}

function updateSelBar() {
  var bar = document.getElementById('linkFamBar');
  var cnt = Object.keys(_selRnos).length;
  document.getElementById('linkFamCount').textContent = cnt + '명 선택';
  var btn = bar.querySelector('.link-fam-btn');
  if (cnt >= 2) {
    bar.classList.add('show');
    btn.disabled = false; btn.style.opacity = '1';
  } else if (_selMode) {
    // 선택모드 진행 중이면 0~1명이어도 바를 계속 보여줘서 '취소'를 놓치지 않도록 함
    bar.classList.add('show');
    btn.disabled = true; btn.style.opacity = '0.45';
  } else {
    bar.classList.remove('show');
  }
}

// ── 차량묶기 선택 모드 ──
function toggleVehSelMode() {
  if (_vehSelMode) exitVehSelMode();
  else enterVehSelMode();
}

function enterVehSelMode() {
  if (_selMode) exitSelMode();
  _vehSelMode = true;
  _vehSelRnos = {};
  refreshSelModeClass();
  document.getElementById('vehModeBtn').classList.add('active');
  updateVehSelBar();
}

function exitVehSelMode() {
  _vehSelMode = false;
  _vehSelRnos = {};
  document.querySelectorAll('.card.selected').forEach(function(c){ c.classList.remove('selected'); });
  refreshSelModeClass();
  document.getElementById('vehModeBtn').classList.remove('active');

}

function toggleVehSelCard(rno) {
  var card = document.getElementById('card-' + rno);

  if (_vehSelRnos[rno]) {
    delete _vehSelRnos[rno];
    card.classList.remove('selected');
  } else {
    _vehSelRnos[rno] = true;
    card.classList.add('selected');
  }
  updateVehSelBar();
}

function updateVehSelBar() {
  var bar = document.getElementById('vehLinkBar');
  var cnt = Object.keys(_vehSelRnos).length;
  document.getElementById('vehLinkCount').textContent = cnt + '명 선택';
  var btn = bar.querySelector('.link-fam-btn');
  if (cnt >= 2) {
    bar.classList.add('show');
    btn.disabled = false; btn.style.opacity = '1';
  } else if (_vehSelMode) {
    // 선택모드 진행 중이면 0~1명이어도 바를 계속 보여줘서 '취소'를 놓치지 않도록 함
    bar.classList.add('show');
    btn.disabled = true; btn.style.opacity = '0.45';
  } else {
    bar.classList.remove('show');
  }

function onCardClick(event, idx) {
  if (_selMode) {
    var d = filtered[idx];
    if (d) toggleSelCard(d.rno);
  } else if (_vehSelMode) {
    var d2 = filtered[idx];
    if (d2) toggleVehSelCard(d2.rno);
  } else {
    openDetail(idx);
  }
}

function startLongPress(event, rno) {
  cancelLongPress();
  _longPressTimer = setTimeout(function() {
    _longPressTimer = null;
    if (_vehSelMode) { toggleVehSelCard(rno); return; }
    if (!_selMode) enterSelMode(rno);
    else toggleSelCard(rno);
  }, 500);
}
function cancelLongPress() {
  if (_longPressTimer) { clearTimeout(_longPressTimer); _longPressTimer = null; }
}
function onCardLongPress(event, rno) {
  event.preventDefault();
  if (_vehSelMode) { toggleVehSelCard(rno); return; }
  if (!_selMode) enterSelMode(rno);
  else toggleSelCard(rno);
}

function toggleSpouse(rno) {
  var sp  = document.getElementById('sp-' + rno);
  var tgl = document.getElementById('tgl-' + rno);
  if (!sp || !tgl) return;
  var open = sp.classList.contains('visible');
  if (open) {
    sp.classList.remove('visible');
    tgl.classList.remove('open');
    tgl.textContent = '💑 ›';
  } else {
    sp.classList.add('visible');
    tgl.classList.add('open');
    tgl.textContent = '💑 ‹';
  }
}

function unlinkFamily(fid) {

  var members = allData.filter(function(d){ return d.family_id === fid; });

  // 로딩 표시
  var panel = document.getElementById('familyPanel');

    method: 'POST',
    headers: { 'Content-Type': 'application/x-www-form-urlencoded' },

      action: 'unlinkFamily',
      fid: fid,

      pw: pw,
      editor: currentUser.name
    }))

      // 로컬 allData에서 family_id 즉시 제거 (화면 반응성)

// ── 차량으로 묶기: 자차 1명 + 동승 N명 선택 → 동승자들의 '동승운전자'를 자차 운전자 이름으로 채움 ──
function doLinkVehicle() {
  var rnos = Object.keys(_vehSelRnos);
  if (rnos.length < 2) { showToast('2명 이상 선택하세요'); return; }
  if (!canEdit()) { showToast('슈퍼바이저 권한이 필요합니다'); return; }

  var members = rnos.map(function(r){ return allData.find(function(d){ return d.rno === r; }); }).filter(Boolean);
  var drivers = members.filter(function(d){ return d.trans === '자차'; });
  if (drivers.length === 0) { showToast('자차 운전자 1명을 포함해서 선택하세요'); return; }
  if (drivers.length > 1)  { showToast('자차는 1명만 선택하세요'); return; }
  var driver = drivers[0];
  var passengers = members.filter(function(d){ return d.rno !== driver.rno; });
  if (passengers.length === 0) { showToast('동승할 인원을 1명 이상 선택하세요'); return; }

  var pNames = passengers.map(function(p){ return p.name; }).join(', ');
  var msg = '🚗 ' + driver.name + ' 차량\n동승: ' + pNames + '\n\n위 ' + passengers.length + '명을 이 차량에 동승으로 묶겠습니까?';
  if (!confirm(msg)) return;

  var pw = currentUser.name + ':' + currentUser.phone;
  var bar = document.getElementById('vehLinkBar');
  var btn = bar.querySelector('.link-fam-btn');
  btn.textContent = '처리 중…'; btn.disabled = true;

  var done = 0, fail = 0;
  function next(i) {
    if (i >= passengers.length) {
      if (fail === 0) {
        showToast('✅ ' + driver.name + ' 차량으로 ' + done + '명 묶음 완료!');
        exitVehSelMode();
        loadData();
      } else {
        showToast('⚠️ ' + done + '명 완료, ' + fail + '명 실패');
        btn.textContent = '🚗 차량으로 묶기'; btn.disabled = false;
      }
      return;
    }
    var p = passengers[i];
    fetch(GAS_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
      body: 'data=' + encodeURIComponent(JSON.stringify({
        action: 'updateRow',
        rno: p.rno,
        fields: { '차량': '동승', '동승운전자': driver.name },
        pw: pw,
        editor: currentUser.name
      }))
    })
    .then(function(r){ return r.json(); })
    .then(function(res){
      if (res.result === 'ok') done++; else fail++;
      next(i + 1);
    })
    .catch(function(){ fail++; next(i + 1); });
  }
  next(0);
}

// 자녀 여부: allData note 필드 기반 (초/중/고/유치/유아)
function accomIsChild(name){
  var d=allData.find(function(x){return x.name&&x.name.trim()===name.trim();});
  if(!d) return ACCOM_KIDS.indexOf(name)>=0; // fallback
  var note=(d.note||'').trim();
  return /초[1-6]|중[1-3]|고[1-3]|유치|유아|어린이/.test(note);
}

function accomChipClass(name,rg){
  if(accomIsChild(name)) return '아이';

  // allData gender 우선
  var d=allData.find(function(x){return x.name&&x.name.trim()===name.trim();});

function loadAccomFromSheet(callback){
  if(!currentUser) return;
  var pw=currentUser.name+':'+currentUser.phone;
  accomShowToast('⏳ 최신 숙소 데이터 불러오는 중...');
  fetch(GAS_URL+'?action=getRoomData&pw='+encodeURIComponent(pw))
    .then(function(r){return r.json();})
    .then(function(j){
      if(j.result==='ok'&&j.rooms&&j.rooms.length){
        // ACCOM_ROOMS 갱신
        j.rooms.forEach(function(rd){
          var room=ACCOM_ROOMS.find(function(r){return r.id===rd.id;});
          if(room){
            room.members=rd.members||[];
            if(rd.gender) room.gender=rd.gender;
            room.realRoom=rd.realRoom||'';
          }
        });
        accomHistory=[];

function accomGetTeam(members){
  var teams=[];
  members.forEach(function(m){
    var mTrim=m.trim();
    var d=allData.find(function(x){return x.name&&x.name.trim()===mTrim;});
    var t=(d&&d.mteam&&d.mteam.trim()&&d.mteam!=='-')?d.mteam:'';
    if(t&&teams.indexOf(t)<0) teams.push(t);
  });
  return teams.length?teams.join(' / '):'─';
}

  var n=name.trim();
  return allData.some(function(x){return x.name&&x.name.trim()===n;});
}

function cleanAccomRooms(){
  if(!allData||!allData.length) return;
  var accomMap={}; // name -> 숙소 필드값 (명단 최신 기준)
  allData.forEach(function(d){ if(d.name) accomMap[d.name.trim()] = d.accom||''; });
  var removed=[], removedAccomChanged=[];
  ACCOM_ROOMS.forEach(function(r){
    r.members=r.members.filter(function(m){
      var nm=m.trim();
      if(!(nm in accomMap)){ removed.push(m+'('+r.id+')'); return false; } // 명단에 없음 → 제거
      if(accomMap[nm] !== '단체(교회준비)'){ removedAccomChanged.push(m+'('+r.id+'→'+(accomMap[nm]||'-')+')'); return false; } // 숙소 필드가 단체준비가 아님 → 제거
      return true;
    });
  });
  if(removed.length){
    console.log('[숙소배치] 명단 미등록으로 제거:', removed.join(', '));
  }
  if(removedAccomChanged.length){
    console.log('[숙소배치] 숙소필드 변경으로 제거:', removedAccomChanged.join(', '));
  }
}

// 방에 실제 배정된 사람들의 성별을 기준으로 표시값 계산 (여만 있으면 '여', 남만 있으면 '남', 섞이면 '남/여')
// 방이 비어있으면 방의 기본 설계 성별(fallback)을 그대로 보여줌
function accomActualGenderInfo(members, fallbackGender){
  if(!members || !members.length) return {text: fallbackGender||'─', cls: fallbackGender||'─'};
  var genders={};
  members.forEach(function(m){
    var d=allData.find(function(x){ return x.name && x.name.trim()===m.trim(); });
    var g=d?(d.gender||'').trim():'';
    if(g==='남'||g==='여') genders[g]=true;
  });
  var keys=Object.keys(genders);
  if(keys.length===0) return {text: fallbackGender||'─', cls: fallbackGender||'─'};
  if(keys.length===1) return {text: keys[0], cls: keys[0]};
  return {text:'남/여', cls:'혼합'};
}

function renderAccomTable(){
  var tb=document.getElementById('accomTbody');
  if(!tb) return;
  var html='', prevPrefix='';
  ACCOM_ROOMS.forEach(function(r){
    var prefix=(r.id||'').charAt(0);
    if(prevPrefix==='C'&&prefix==='D'){
      html+='<tr class="accom-divider"><td colspan="6"></td></tr>';
    }
    prevPrefix=prefix;
    var cnt=r.members.length;
    var capCls=cnt>r.cap?'over':cnt===r.cap?'full':cnt===0?'empty':'part';
    var isEmpty=cnt===0;
    var isChanged=accomChangedRows.has(r.id);
    var teamStr=isEmpty?'(여유)':accomGetTeam(r.members);
    // 팀명: '/' 기준으로 <br> 줄바꿈
    var teamHtml=teamStr.replace(/ \/ /g,'<br>').replace(/\//g,'<br>');
    var chips='';
    if(isEmpty){
      chips='<span class="accom-chip ─">여유 '+r.cap+'자리</span>';
    } else {
      // 4인 단위 행 분리
      for(var ri2=0;ri2<r.members.length;ri2+=4){
        var rowSlice=r.members.slice(ri2,ri2+4);
        chips+='<div class="accom-members-row">';
        rowSlice.forEach(function(m){
          var cc=accomChipClass(m,r.gender);
          var isKid=accomIsChild(m);
          var kid=isKid?'🎒':'';
          var unreg=!accomIsRegistered(m);
          var teamColor=accomTeamColor(m);
          var dInfo=allData.find(function(x){return x.name&&x.name.trim()===m.trim();});
          var title=unreg?'사역팀 미등록':(dInfo?(dInfo.mteam||'')+(dInfo.note?' ('+dInfo.note+')':''):'');
          var style=unreg?'':'border-color:'+teamColor+';border-width:1px;';
          chips+='<span class="accom-chip '+cc+(isChanged?' moved':'')+(unreg?' unreg':'')+'" data-name="'+m+'" data-roomid="'+r.id+'" title="'+title+'" style="'+style+'">'+m+kid+'</span>';
        });
        chips+='</div>';
      }
    }
    html+='<tr class="accom-type-'+r.type+(isEmpty?' empty-row':'')+(isChanged?' accom-changed':'')+'"';
    html+=' data-id="'+r.id+'" data-gender="'+r.gender+'" data-team="'+teamStr+'" data-members="'+r.members.join(',')+'">'; 
    html+='<td><span class="accom-room-id">'+r.id+'</span></td>';
    html+='<td><input type="text" class="accom-realroom-inp" value="'+(r.realRoom?esc(r.realRoom):'')+'" placeholder="-" maxlength="10" data-id="'+r.id+'" oninput="accomSetRealRoom(this.dataset.id,this.value)"></td>';
    html+='<td><span class="accom-type-badge">'+r.typeName+'</span></td>';
    var genderInfo=accomActualGenderInfo(r.members, r.gender);
    html+='<td><span class="accom-g-badge '+genderInfo.cls+'">'+genderInfo.text+'</span></td>';
    html+='<td><span class="accom-cap '+capCls+'">'+cnt+'/'+r.cap+'</span></td>';
    html+='<td class="accom-team-cell left">'+teamHtml+'</td>';
    html+='<td class="left"><div class="accom-members-cell" data-roomid="'+r.id+'">'+chips+'</div></td>';
    html+='</tr>';
  });
  tb.innerHTML=html;
  // ── fixed 헤더 생성 및 스크롤 동기화 ──
  requestAnimationFrame(function(){
    var hd  = document.querySelector('.hd');
    var tab = document.querySelector('.tab-bar');
    var stickyTop = (hd ? hd.offsetHeight : 50) + (tab ? tab.offsetHeight : 54);

    // fixed 헤더 컨테이너 생성 (기존 것 재사용)
    var fixedHdr = document.getElementById('accomFixedHeader');
    if(!fixedHdr){
      fixedHdr = document.createElement('div');
      fixedHdr.id = 'accomFixedHeader';
      fixedHdr.className = 'accom-thead-fixed';
      document.body.appendChild(fixedHdr);
    }
    fixedHdr.style.top = stickyTop + 'px';
    fixedHdr.style.display = 'none';

    var origTable = document.querySelector('.accom-table');
    if(origTable){
      // thead 복제
      var cloneTable = document.createElement('table');
      cloneTable.style.cssText = 'border-collapse:separate;border-spacing:0;table-layout:fixed;';
      var cloneThead = origTable.querySelector('thead').cloneNode(true);
      cloneTable.appendChild(cloneThead);
      fixedHdr.innerHTML = '';
      fixedHdr.appendChild(cloneTable);

      // 열 너비를 원본 tbody 첫 행의 각 td.offsetWidth 기준으로 맞춤
      function syncColWidths(){
        var wrap = document.querySelector('.accom-tbl-wrap');
        if(!wrap) return;
        var wrapRect = wrap.getBoundingClientRect();
        // fixed 헤더 위치/너비: tbl-wrap 기준
        fixedHdr.style.left  = wrapRect.left + 'px';
        fixedHdr.style.width = wrapRect.width + 'px';
        // 원본 thead th의 실제 너비 → 복제 th에 적용
        var origThs = origTable.querySelectorAll('thead th');
        var cloneThs = cloneTable.querySelectorAll('thead th');
        var totalW = 0;
        origThs.forEach(function(th, i){
          var w = th.offsetWidth;
          totalW += w;
          if(cloneThs[i]) cloneThs[i].style.width = w + 'px';
        });
        cloneTable.style.width = totalW + 'px';
        // 가로 스크롤 위치 동기화
        fixedHdr.scrollLeft = wrap.scrollLeft;
      }
      syncColWidths();

      // 가로 스크롤 동기화
      var wrap2 = document.querySelector('.accom-tbl-wrap');
      if(wrap2){
        wrap2.addEventListener('scroll', function(){
          fixedHdr.scrollLeft = wrap2.scrollLeft;
        });
      }

      // 세로 스크롤 → fixed 헤더 표시/숨김 + 위치 재보정
      var theadEl = origTable.querySelector('thead');
      function onPageScroll(){
        if(!theadEl || !origTable) return;
        var rect = theadEl.getBoundingClientRect();
        if(rect.top < stickyTop){
          if(fixedHdr.style.display !== 'block'){
            syncColWidths(); // 표시 직전 위치/폭 재계산
            fixedHdr.style.display = 'block';
          }
        } else {
          fixedHdr.style.display = 'none';
        }
      }
      if(window._accomScrollHandler) window.removeEventListener('scroll', window._accomScrollHandler);
      window._accomScrollHandler = onPageScroll;
      window.addEventListener('scroll', onPageScroll, {passive:true});
      onPageScroll();
    }
  });
  bindAccomDrag();
  applyAccomFilter();
  accomUpdateSummary();
}


function accomUpdateSummary(){
  var el=document.getElementById('accomSummary');
  if(!el) return;
  var placed=0, total=0;
  ACCOM_ROOMS.forEach(function(r){ placed+=r.members.length; total+=r.cap; });
  el.innerHTML='🏕️ 숙소인원 <b>'+placed+'명</b> <span>/ 총정원 '+total+'명</span>'
    +'<span style="margin-left:8px;color:'+(total-placed>0?'#16A34A':'#DC2626')+'">잔여 '+(total-placed)+'</span>';
  renderAccomUnassigned();
}

function getAccomUnassigned(){
  // 단체(교회준비) + 7/21~22 일정 인원 중 ACCOM_ROOMS에 없는 사람
  if(!allData||!allData.length) return [];
  var placedNames={};
  ACCOM_ROOMS.forEach(function(r){
    r.members.forEach(function(m){ placedNames[m.trim()]=true; });
  });
  var resultNames={};
  var result=allData.filter(function(d){
    if(!d.accom||d.accom.indexOf('단체')<0) return false;
    // 7/21~22 일정 포함 여부 (표기 방식 다양: "7/21~22", "7/21~7/22", "7/21~22(화~수)" 등)
    var sched=(d.sched||'').replace(/\s/g,'');
    var is2day=sched.indexOf('7/21')>=0&&(sched.indexOf('22')>=0||sched.indexOf('7/22')>=0);
    if(!is2day) return false;
    if(d.name&&d.name.trim()==='고영수') return false;
    return !placedNames[d.name&&d.name.trim()];
  });
  result.forEach(function(d){ resultNames[d.name.trim()]=true; });

  // 수동으로 "미배치로 이동" 처리된 사람은 숙소/일정 조건과 무관하게 항상 포함
  // (다시 방에 배치되면 자동으로 추적 해제)
  Object.keys(accomManualUnassigned).forEach(function(name){
    if(placedNames[name]){ delete accomManualUnassigned[name]; return; }
    if(resultNames[name]) return;
    var d=allData.find(function(x){ return x.name && x.name.trim()===name; });
    if(!d) return;
    resultNames[name]=true;
    result.push(d);
  });

  return result;
}

function renderAccomUnassigned(){
  var box=document.getElementById('accomUnassignedBox');
  if(!box) return;
  var list=getAccomUnassigned();
  if(!list.length){ box.innerHTML=''; return; }

  // 팀명 + 목장명 복합 그룹핑
  var groups={};
  list.forEach(function(d){
    var team=(d.mteam||'(미지정)').trim();
    var moksang=(d.moksang||'').trim()||'-';
    var key=team+'__'+moksang;
    if(!groups[key]) groups[key]={team:team,moksang:moksang,members:[]};
    groups[key].members.push(d);
  });

  // 팀명 → 목장명 순 정렬
  var sortedKeys=Object.keys(groups).sort(function(a,b){
    var ta=groups[a].team, tb=groups[b].team;
    if(ta!==tb) return ta.localeCompare(tb,'ko');
    return groups[a].moksang.localeCompare(groups[b].moksang,'ko');
  });

  var isOpen=box.dataset.open==='1';
  var h='<div class="accom-unassigned-hd" onclick="toggleUnassignedBox()">';
  h+='<span class="accom-unassigned-hd-title">📋 숙소 미배치 인원</span>';
  h+='<span class="accom-unassigned-hd-cnt">'+list.length+'명</span>';
  h+='<span class="accom-unassigned-hd-arrow'+(isOpen?' open':'')+'">▼</span>';
  h+='</div>';
  h+='<div class="accom-unassigned-body'+(isOpen?' show':'')+'">';
  h+='<table class="accom-unassigned-table"><thead><tr>';
  h+='<th>팀명</th><th>목장</th><th>인원</th><th>명단 (5명씩)</th>';
  h+='</tr></thead><tbody>';

  // 팀명이 같은 연속 행은 rowspan으로 병합
  // 먼저 팀별 행 수 계산
  var teamRowCount={};
  sortedKeys.forEach(function(key){
    var g=groups[key];
    var rowCount=Math.ceil(g.members.length/5)||1;
    teamRowCount[key]=rowCount;
  });
  var teamSpanDone={};

  sortedKeys.forEach(function(key){
    var g=groups[key];
    var members=g.members;
    var rows=[];
    for(var i=0;i<members.length;i+=5) rows.push(members.slice(i,i+5));
    if(!rows.length) rows=[[]];

    // 같은 팀의 총 행 수 (rowspan용)
    var sameTeamKeys=sortedKeys.filter(function(k){return groups[k].team===g.team;});
    var totalTeamRows=sameTeamKeys.reduce(function(acc,k){
      return acc+Math.ceil(groups[k].members.length/5||1);
    },0);

    var isFirst=true;
    rows.forEach(function(rowMembers){
      h+='<tr>';
      // 팀명 셀: 팀 첫 행에만 rowspan
      if(!teamSpanDone[g.team]){
        teamSpanDone[g.team]=true;
        h+='<td class="td-team" rowspan="'+totalTeamRows+'">'+g.team+'</td>';
      }
      // 목장명 셀: 목장 첫 행에만 rowspan
      if(isFirst){
        h+='<td class="td-team" rowspan="'+rows.length+'">'+g.moksang+'</td>';
        h+='<td class="td-cnt" rowspan="'+rows.length+'">'+members.length+'명</td>';
        isFirst=false;
      }
      h+='<td><div class="accom-unassigned-chips">';
      rowMembers.forEach(function(d){
        var gc=d.gender==='여'?'여':d.gender==='남'?'남':'';
        var tip=(d.mteam||'')+' / '+(d.moksang||'');
        h+='<span class="accom-pool-chip '+gc+'" data-name="'+d.name+'" data-gender="'+d.gender
          +'" data-mteam="'+(d.mteam||'')+'" title="'+tip+'" onclick="openAssignModal(this.dataset.name,this.dataset.gender,this.dataset.mteam)">'
          +d.name+'</span>';
      });
      h+='</div></td></tr>';
    });
  });

  h+='</tbody></table></div>';
  box.innerHTML=h;
  bindPoolDrag();
}


function toggleUnassignedBox(){
  var box=document.getElementById('accomUnassignedBox');
  if(!box) return;
  var isOpen=box.dataset.open==='1';
  box.dataset.open=isOpen?'0':'1';
  renderAccomUnassigned();
}

// 방 선택 모달
function openAssignModal(name, gender, mteam){
  // 기존 모달 제거
  var old=document.getElementById('accomAssignModal');
  if(old) old.remove();

  // 타입별 색상
  var TYPE_COLOR={A:'#1E3A8A',B:'#166534',C:'#854D0E',D:'#9A3412',E:'#5B21B6',F:'#9F1239'};
  var TYPE_BG={A:'#DBEAFE',B:'#DCFCE7',C:'#FEF08A',D:'#FFEDD5',E:'#EDE9FE',F:'#FFE4E6'};

  var modal=document.createElement('div');
  modal.id='accomAssignModal';
  modal.className='accom-assign-modal';
  modal.onclick=function(e){if(e.target===modal) closeAssignModal();};

  var g=gender==='여'?'🔴':gender==='남'?'🔵':'';
  var h='<div class="accom-assign-sheet">';
  h+='<div class="accom-assign-handle"></div>';
  h+='<div class="accom-assign-title">'+g+' '+name+' 배치</div>';
  h+='<div class="accom-assign-subtitle">사역팀: '+(mteam||'─')+'&nbsp;&nbsp;성별: '+(gender||'─')+'</div>';

  // 여유있는 방 목록 (성별 우선, 여유 있는 방)
  var roomsToShow=[];
  ACCOM_ROOMS.forEach(function(r){
    if(r.members.indexOf(name)>=0) return; // 이미 배치됨
    var remain=r.cap-r.members.length;
    roomsToShow.push({r:r,remain:remain});
  });
  // 같은 성별 방 우선, 그 다음 여유 많은 순
  roomsToShow.sort(function(a,b){
    var ag=(a.r.gender===gender||a.r.gender==='혼합')?0:1;
    var bg=(b.r.gender===gender||b.r.gender==='혼합')?0:1;
    if(ag!==bg) return ag-bg;
    return b.remain-a.remain;
  });

  h+='<div class="accom-assign-rooms">';
  roomsToShow.forEach(function(item){
    var r=item.r, remain=item.remain;
    var bg=TYPE_BG[r.type]||'#F8FAFC';
    var fg=TYPE_COLOR[r.type]||'#1E293B';
    var capCls=remain===0?'warn':remain<=1?'warn':'ok';
    var capTxt=remain===0?'만실':'잔여 '+remain+'자리';
    var team=r.members.length>0?accomGetTeam(r.members):'(비어있음)';
    h+='<button class="accom-assign-room-btn" data-name="'+name+'" data-rid="'+r.id+'" onclick="doAssign(this.dataset.name,this.dataset.rid)" style="border-left:4px solid '+fg+';background:'+bg+'20">';
    h+='<span class="accom-assign-room-id" style="color:'+fg+'">'+r.id+'</span>';
    h+='<span class="accom-assign-room-info">'+r.typeName+' · '+r.gender+' · '+team+'</span>';
    h+='<span class="accom-assign-room-cap '+capCls+'">'+capTxt+'</span>';
    h+='</button>';
  });
  h+='</div>';
  h+='<button class="accom-assign-cancel" onclick="closeAssignModal()">취소</button>';
  h+='</div>';
  modal.innerHTML=h;
  document.body.appendChild(modal);
}

function closeAssignModal(){
  var m=document.getElementById('accomAssignModal');
  if(m) m.remove();
}

function doAssign(name, toId){
  var toRoom=ACCOM_ROOMS.find(function(r){return r.id===toId;});
  if(!toRoom) return;
  if(toRoom.members.indexOf(name)>=0){
    accomShowToast('이미 배치된 인원입니다');
    closeAssignModal();
    return;
  }
  if(toRoom.members.length>=toRoom.cap){
    if(!confirm(toId+' 방이 정원('+toRoom.cap+'명)을 초과합니다. 추가하시겠습니까?')){
      return;
    }
  }
  toRoom.members.push(name);
  accomHistory.push({name:name,fromId:'(미배치)',toId:toId});
  accomChangedRows.add(toId);
  closeAssignModal();
  renderAccomTable();
  accomUpdateChangeBar();
  accomShowToast('✅ '+name+' → '+toId+' 배치 완료');
}



function setAccomFilter(f,el){
  accomFilter=f;
  document.querySelectorAll('.accom-tab').forEach(function(t){t.classList.remove('active');});
  el.classList.add('active');
  applyAccomFilter();
}
function setAccomSearch(v){accomSearch=v.trim().toLowerCase();applyAccomFilter();}
function applyAccomFilter(){
  document.querySelectorAll('#accomTbody tr:not(.accom-divider)').forEach(function(tr){
    if(!tr.dataset.id) return;
    var g=tr.dataset.gender, mem=tr.dataset.members||'', team=tr.dataset.team||'';
    var cnt=mem?mem.split(',').filter(Boolean).length:0;
    var roomCap=99;
    if(accomFilter==='잔여'){
      var roomObj=ACCOM_ROOMS.find(function(r){return r.id===tr.dataset.id;});
      if(roomObj) roomCap=roomObj.cap;
    }
    var gMatch=accomFilter==='전체'||(accomFilter==='잔여'?cnt<roomCap:g===accomFilter);
    var qMatch=!accomSearch||(tr.dataset.id.toLowerCase().includes(accomSearch)||team.toLowerCase().includes(accomSearch)||mem.toLowerCase().includes(accomSearch));
    tr.classList.toggle('accom-row-hidden',!(gMatch&&qMatch));
  });
  document.querySelectorAll('#accomTbody tr.accom-divider').forEach(function(div){
    var next=div.nextElementSibling, allHidden=true;
    while(next&&!next.classList.contains('accom-divider')){
      if(!next.classList.contains('accom-row-hidden')) allHidden=false;
      next=next.nextElementSibling;
    }
    div.classList.toggle('accom-row-hidden',allHidden);
  });
}

// 드래그&드롭
function bindAccomDrag(){
  document.querySelectorAll('.accom-chip:not(.─)').forEach(function(chip){
    chip.addEventListener('mousedown',accomMouseDown);
    chip.addEventListener('touchstart',accomTouchStart,{passive:true}); // passive:true → 스크롤 우선
  });
}
function accomMouseDown(e){
  if(e.button!==0)return;
  accomStartDrag(e.currentTarget,e.clientX,e.clientY);
  document.addEventListener('mousemove',accomMouseMove);
  document.addEventListener('mouseup',accomMouseUp);
  e.preventDefault();
}
function accomMouseMove(e){accomMoveDrag(e.clientX,e.clientY);}
function accomMouseUp(e){accomEndDrag(e.clientX,e.clientY);document.removeEventListener('mousemove',accomMouseMove);document.removeEventListener('mouseup',accomMouseUp);}

// 터치: 롱프레스(500ms) 후 드래그 시작, 그 전에 손가락 움직이면 스크롤로 처리
var accomLongPressTimer=null;
var accomLongPressTimer2=null;  // 800ms → 미배치 이동
var accomTouchStartX=0, accomTouchStartY=0;
var accomLongPressChip=null;
var accomDragMoved=false; // 드래그 시작(500ms) 후 실제로 손가락이 움직였는지 여부
var ACCOM_LONG_PRESS_MS=500;   // 500ms: 드래그 시작
var ACCOM_REMOVE_MS=900;       // 900ms: 미배치 이동 팝업
var ACCOM_MOVE_THRESHOLD=8;

function accomTouchStart(e){
  var t=e.touches[0];
  accomTouchStartX=t.clientX;
  accomTouchStartY=t.clientY;
  accomLongPressChip=e.currentTarget;
  accomLongPressChip.classList.add('pressing');
  accomDragMoved=false;

  // 500ms → 드래그 시작(픽업 표시). 이후 실제로 움직이지 않으면 900ms에 취소되고 팝업으로 전환됨
  accomLongPressTimer=setTimeout(function(){
    accomLongPressTimer=null;
    accomLongPressChip.classList.remove('pressing');
    if(navigator.vibrate) navigator.vibrate(40);
    accomStartDrag(accomLongPressChip, accomTouchStartX, accomTouchStartY);
    document.addEventListener('touchmove', accomTouchMove, {passive:false});
    document.addEventListener('touchend', accomTouchEnd);
  }, ACCOM_LONG_PRESS_MS);

  // 900ms → 드래그가 실제로 움직이지 않았다면 취소하고 미배치 이동 팝업 표시
  accomLongPressTimer2=setTimeout(function(){
    accomLongPressTimer2=null;
    var chip=accomLongPressChip;
    if(!chip) return;

    if(accomDragging && !accomDragMoved){
      // 드래그는 시작됐지만 손가락이 거의 안 움직임 → 드래그 취소, 팝업으로 전환
      accomDragging.el.classList.remove('dragging');
      var g=document.getElementById('accomGhost'); if(g) g.style.display='none';
      if(accomOverCell){ accomOverCell.classList.remove('drag-over'); accomOverCell=null; }
      accomDragging=null;
      document.removeEventListener('touchmove',accomTouchMove);
      document.removeEventListener('touchend',accomTouchEnd);
    } else if(accomDragging && accomDragMoved){
      return; // 실제로 드래그 중 → 그대로 둠
    } else {
      // 드래그가 아직 시작 안 된 경우(타이머 순서가 바뀐 예외 상황 대비)
      clearTimeout(accomLongPressTimer);
      accomLongPressTimer=null;
      document.removeEventListener('touchmove',accomTouchStartMove);
    }

    chip.classList.remove('pressing');
    if(navigator.vibrate) navigator.vibrate([40,30,40]);
    showAccomRemovePopup(chip.dataset.name, chip.dataset.roomid);
  }, ACCOM_REMOVE_MS);

  document.addEventListener('touchmove', accomTouchStartMove, {passive:true});
  document.addEventListener('touchend', accomTouchStartEnd, {once:true});
}
function accomTouchStartMove(e){
  if(!accomLongPressTimer && !accomLongPressTimer2) return;
  var t=e.touches[0];
  var dx=Math.abs(t.clientX-accomTouchStartX);
  var dy=Math.abs(t.clientY-accomTouchStartY);
  if(dx>ACCOM_MOVE_THRESHOLD||dy>ACCOM_MOVE_THRESHOLD){
    clearTimeout(accomLongPressTimer); accomLongPressTimer=null;
    clearTimeout(accomLongPressTimer2); accomLongPressTimer2=null;
    if(accomLongPressChip) accomLongPressChip.classList.remove('pressing');
    document.removeEventListener('touchmove',accomTouchStartMove);
  }
}
function accomTouchStartEnd(){
  clearTimeout(accomLongPressTimer); accomLongPressTimer=null;
  clearTimeout(accomLongPressTimer2); accomLongPressTimer2=null;
  if(accomLongPressChip) accomLongPressChip.classList.remove('pressing');
  document.removeEventListener('touchmove',accomTouchStartMove);
}
function accomTouchMove(e){
  if(!accomDragging) return;
  var t=e.touches[0];
  var dx=Math.abs(t.clientX-accomTouchStartX), dy=Math.abs(t.clientY-accomTouchStartY);
  if(dx>ACCOM_MOVE_THRESHOLD||dy>ACCOM_MOVE_THRESHOLD) accomDragMoved=true;
  accomMoveDrag(t.clientX,t.clientY);
  e.preventDefault();
}
function accomTouchEnd(e){
  var t=e.changedTouches[0];
  accomEndDrag(t.clientX,t.clientY);
  document.removeEventListener('touchmove',accomTouchMove);
  document.removeEventListener('touchend',accomTouchEnd);
  document.removeEventListener('touchmove',accomTouchStartMove);
}
function accomStartDrag(chip,x,y){
  accomDragging={name:chip.dataset.name,fromId:chip.dataset.roomid,el:chip};
  chip.classList.add('dragging');
  var g=document.getElementById('accomGhost')||createAccomGhost();
  g.textContent=chip.textContent;
  g.style.background=getComputedStyle(chip).backgroundColor;
  g.style.color=getComputedStyle(chip).color;
  g.style.display='block';
  g.style.left=x+'px';g.style.top=y+'px';
}
function accomMoveDrag(x,y){
  if(!accomDragging)return;
  var g=document.getElementById('accomGhost');
  if(g){g.style.left=x+'px';g.style.top=y+'px';}
  if(g)g.style.display='none';
  var el=document.elementFromPoint(x,y);
  if(g)g.style.display='block';
  var cell=el?el.closest('.accom-members-cell'):null;
  if(accomOverCell&&accomOverCell!==cell)accomOverCell.classList.remove('drag-over');
  if(cell&&cell.dataset.roomid!==accomDragging.fromId){cell.classList.add('drag-over');accomOverCell=cell;}
  else accomOverCell=null;
}
function accomEndDrag(x,y){
  if(!accomDragging){var g=document.getElementById('accomGhost');if(g)g.style.display='none';return;}
  var g=document.getElementById('accomGhost');if(g)g.style.display='none';
  if(accomOverCell)accomOverCell.classList.remove('drag-over');
  if(g)g.style.display='none';
  var el=document.elementFromPoint(x,y);
  var targetCell=el?el.closest('.accom-members-cell'):null;
  var toId=targetCell?targetCell.dataset.roomid:null;
  accomDragging.el.classList.remove('dragging');
  if(toId&&toId!==accomDragging.fromId)accomDoMove(accomDragging.name,accomDragging.fromId,toId);
  accomDragging=null;accomOverCell=null;
}
function accomDoMove(name,fromId,toId){
  var fr=ACCOM_ROOMS.find(function(r){return r.id===fromId;});
  var tr=ACCOM_ROOMS.find(function(r){return r.id===toId;});
  if(!fr||!tr)return;
  if(tr.members.length>=tr.cap){if(!confirm(toId+' 방이 정원('+tr.cap+'명)을 초과합니다. 이동하시겠습니까?'))return;}
  fr.members=fr.members.filter(function(m){return m!==name;});
  tr.members.push(name);
  accomHistory.push({name:name,fromId:fromId,toId:toId});
  accomChangedRows.add(fromId);accomChangedRows.add(toId);
  renderAccomTable();accomUpdateChangeBar();
  accomShowToast('✅ '+name+' → '+toId+' 이동');
}
function accomUndo(){
  if(!accomHistory.length)return;
  var last=accomHistory.pop();
  var fr=ACCOM_ROOMS.find(function(r){return r.id===last.toId;});
  var tr=ACCOM_ROOMS.find(function(r){return r.id===last.fromId;});
  fr.members=fr.members.filter(function(m){return m!==last.name;});
  tr.members.push(last.name);
  accomChangedRows=new Set();
  accomHistory.forEach(function(h){accomChangedRows.add(h.fromId);accomChangedRows.add(h.toId);});
  renderAccomTable();accomUpdateChangeBar();
  accomShowToast('↩ '+last.name+' 되돌리기');
}
function accomReset(){
  if(!confirm('모든 변경사항을 초기화하시겠습니까?'))return;
  while(accomHistory.length){
    var last=accomHistory.pop();
    var fr=ACCOM_ROOMS.find(function(r){return r.id===last.toId;});
    var tr=ACCOM_ROOMS.find(function(r){return r.id===last.fromId;});
    if(fr&&tr){fr.members=fr.members.filter(function(m){return m!==last.name;});tr.members.push(last.name);}
  }
  accomChangedRows=new Set();
  renderAccomTable();accomUpdateChangeBar();
  accomShowToast('🔄 전체 초기화');
}
function accomUpdateChangeBar(){
  var bar=document.getElementById('accomChangeBar');
  var msg=document.getElementById('accomChangeMsg');
  if(!bar)return;
  var total=accomHistory.length+accomRealRoomChanged.size;
  if(total===0){bar.classList.remove('show');}
  else{bar.classList.add('show');msg.textContent='변경 '+total+'건 (미저장)';}
}
function accomSetRealRoom(id, val){
  var room=ACCOM_ROOMS.find(function(r){return r.id===id;});
  if(!room) return;
  room.realRoom=val.trim();
  accomRealRoomChanged.add(id);
  accomUpdateChangeBar();
}
function accomSave(){
  var btn=document.querySelector('.accom-btn-save');
  if(!btn) return;
  btn.textContent='저장 중...'; btn.disabled=true;

  // 엑셀 양식과 동일한 컬럼으로 전체 데이터 전송
  // A:방번호 B:숙소타입 C:성별 D:인원 E:총인원 F:잔여 G:팀명 H:숙소자 I:수정
  var META={A01:'2인 침대/침구',A02:'2인 침대/침구',A03:'2인 침대/침구',
    A04:'2인 침대/침구',A05:'2인 침대/침구',A06:'2인 침대/침구',
    A07:'2인 침대/침구',A08:'2인 침대/침구',A09:'2인 침대/침구',
    A10:'2인 침대/침구',A11:'2인 침대/침구',
    B01:'트윈2',B02:'트윈2',B03:'트윈2',B04:'트윈2',B05:'트윈2',
    C01:'트윈1, 침구 2',C02:'트윈1, 침구 2',
    D01:'침구3',D02:'침구3',D03:'침구3',D04:'침구3',D05:'침구3',
    F01:'트윈1, 싱글1, 침구3',F02:'트윈1, 싱글1, 침구3',E01:'침구5'};

  var roomData=ACCOM_ROOMS.map(function(r){
    var cnt=r.members.length;
    var teamStr=cnt===0?'(여유)':accomGetTeam(r.members);
    return {
      id:       r.id,
      realRoom: r.realRoom||'',
      typeName: r.typeName,
      gender:   r.gender,
      cnt:      cnt,
      cap:      r.cap,
      remain:   r.cap-cnt,
      team:     teamStr,
      members:  r.members.join(', '),
      note:     META[r.id]||''
    };
  });

  var pw=currentUser.name+':'+currentUser.phone;
  fetch(GAS_URL,{method:'POST',headers:{'Content-Type':'application/x-www-form-urlencoded'},
    body:'data='+encodeURIComponent(JSON.stringify({
      action:'saveRoomAssign',
      pw:pw,
      rooms:roomData,
      log:accomHistory
    }))
  }).then(function(r){return r.json();})
  .then(function(j){
    if(j.result==='ok'){
      accomHistory=[];
      accomChangedRows=new Set();
      accomRealRoomChanged=new Set();
      renderAccomTable();
      accomUpdateChangeBar();
      accomShowToast('💾 구글시트 저장 완료!');
    } else {
      accomShowToast('❌ 저장 실패: '+(j.message||'오류'));
    }
  }).catch(function(e){
    accomShowToast('❌ 네트워크 오류');
  }).finally(function(){
    btn.textContent='💾 저장';
    btn.disabled=false;
  });
}
function accomExportExcel(){

    s.src='https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js';

    s.onerror=function(){accomShowToast('❌ 라이브러리 로드 실패');};
