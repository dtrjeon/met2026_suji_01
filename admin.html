// ── 탭 전환 ──
function switchTab(tab) {
  document.getElementById('tabList').className = 'tab'+(tab==='list'?' active':'');
  document.getElementById('tabStat').className = 'tab'+(tab==='stat'?' active':'');
  document.getElementById('tabMiss').className = 'tab'+(tab==='miss'?' active':'');
  document.getElementById('tabAcct').className = 'tab'+(tab==='acct'?' active':'');
  var tabFamily = document.getElementById('tabFamily');
  if(tabFamily) tabFamily.className = 'tab'+(tab==='family'?' active':'');
  var tabEditlog = document.getElementById('tabEditlog');
  if(tabEditlog) tabEditlog.className = 'tab'+(tab==='editlog'?' active':'');
  document.getElementById('listWrap').style.display    = tab==='list'?'block':'none';
  document.getElementById('statPanel').className       = 'stat-panel'+(tab==='stat'?' show':'');
  document.getElementById('missPanel').className       = 'miss-panel'+(tab==='miss'?' show':'');
  document.getElementById('missSearchWrap').style.display = tab==='miss'?'block':'none';
  document.getElementById('acctPanel').className       = 'acct-panel'+(tab==='acct'?' show':'');
  var familyPanel = document.getElementById('familyPanel');
  if(familyPanel) familyPanel.className = 'family-panel'+(tab==='family'?' show':'');
  var editlogPanel = document.getElementById('editlogPanel');
  if(editlogPanel) editlogPanel.className = 'editlog-panel'+(tab==='editlog'?' show':'');
  document.getElementById('filterWrap').style.display  = tab==='list'?'flex':'none';
  document.querySelector('.search-wrap').style.display = tab==='list'?'block':'none';
  document.getElementById('resultBar').style.display   = tab==='list'?'block':'none';
  document.getElementById('refreshBtn').style.display  = tab==='list'?'flex':'none';
  if(tab==='miss')    renderMissing();
  if(tab==='acct')    renderAcct();
  if(tab==='family')  renderFamily();
  if(tab==='editlog') loadEditLog();
  if(tab!=='miss'&&tab!=='acct'&&tab!=='family'&&tab!=='editlog') buildFilters();
}

// ── 누락자 렌더링 ──
function renderMissing() {
  dupSelected = {};
  var msi = document.getElementById('missSearchInput');
  if(msi) msi.value = '';
  var msc = document.getElementById('missSearchClr');
  if(msc) msc.style.display = 'none';
  var msr = document.getElementById('missSearchResults');
  if(msr) msr.innerHTML = '';
  var noPhone = allData.filter(function(d){ return !d.phone || d.phone.trim()===''; });
  var noSsn   = allData.filter(function(d){ return !d.ssn  || d.ssn.trim()===''  || d.ssn.trim()==='-'; });
  var ssnIssues = allData.filter(function(d){ return d.ssnIssue && d.ssnIssue.trim()!==''; });

  function editBtn(rno){
    if(!canEdit()) return '';
    return '<button onclick="event.stopPropagation();_editFromTab=\'miss\';openMissDetail(\''+esc(rno)+'\');setTimeout(openEdit,200);" '
      +'style="margin-left:auto;padding:4px 10px;font-size:11px;font-weight:700;color:#1a3a9e;'
      +'background:rgba(32,80,200,0.08);border:1px solid rgba(32,80,200,0.25);border-radius:6px;cursor:pointer;">✏️ 수정</button>';
  }

  function makeCards(list) {
    if(!list.length) return '<div class="miss-empty">✅ 누락 없음</div>';
    return list.map(function(d, i){
      var youth = isYouth(d);
      var grade = youthGrade(d);
      var numBg = youth ? 'linear-gradient(135deg,#f07000,#c85000)' : 'linear-gradient(135deg,#e03030,#b01010)';
      return '<div class="miss-card" onclick="openMissDetail(&apos;'+esc(d.rno)+'&apos;)">'
        +'<div class="miss-num" style="background:'+numBg+';">'+(youth?'🎒':'')+(i+1)+'</div>'
        +'<div class="miss-info">'
        +'<div class="miss-name">'
        +(youth?'🎒 ':'')
        +esc(d.name)
        +(grade?'<span style="font-size:10px;padding:1px 6px;border-radius:4px;background:rgba(255,140,0,0.12);color:#b85c00;border:1px solid rgba(255,140,0,0.25);font-weight:700;margin-left:5px;">'+esc(grade)+'</span>':'')
        +(d.gender?' ('+esc(d.gender)+')':'')+(d.ids?' · '+esc(d.ids):'')+'</div>'
        +'<div class="miss-sub">'+esc(d.pastor||'-')+' / '+esc(d.moksang||'-')+' · '+esc(d.mteam||'-')+'</div>'
        +'</div>'
        +'<div class="miss-rno">'+esc(d.rno)+'</div>'
        +editBtn(d.rno)
        +'</div>';
    }).join('');
  }

  // 주민번호 형식/성별 불일치 카드 (사유 표시 포함)
  function makeIssueCards(list) {
    if(!list.length) return '<div class="miss-empty">✅ 오류 없음</div>';
    return list.map(function(d, i){
      return '<div class="miss-card" onclick="openMissDetail(&apos;'+esc(d.rno)+'&apos;)">'
        +'<div class="miss-num" style="background:linear-gradient(135deg,#e03030,#b01010);">'+(i+1)+'</div>'
        +'<div class="miss-info">'
        +'<div class="miss-name">'+esc(d.name)+(d.gender?' ('+esc(d.gender)+')':'')+(d.ids?' · '+esc(d.ids):'')+'</div>'
        +'<div class="miss-sub">'+esc(d.pastor||'-')+' / '+esc(d.moksang||'-')+'  ·  주민번호: '+esc(d.ssn||'-')+'</div>'
        +'<div class="miss-sub" style="color:var(--red);font-weight:700;">⚠️ '+esc(d.ssnIssue)+'</div>'
        +'</div>'
        +'<div class="miss-rno">'+esc(d.rno)+'</div>'
        +editBtn(d.rno)
        +'</div>';
    }).join('');
  }

  // 이름 중복 그룹 (이름 기준 오름차순)
  var nameMap = {};
  allData.forEach(function(d){
    var key = (d.name||'').trim();
    if(!key) return;
    if(!nameMap[key]) nameMap[key]=[];
    nameMap[key].push(d);
  });
  var dupGroups = Object.keys(nameMap)
    .filter(function(k){ return nameMap[k].length > 1; })
    .sort();

  // 두 항목 간 다른 필드 찾기
  function diffFields(members) {
    var keys = ['moksang','mteam','sched','trans','accom','village','pastor'];
    var labels = {'moksang':'목장','mteam':'사역팀','sched':'일정','trans':'차량','accom':'숙소','village':'마을','pastor':'목자'};
    var diffs = [];
    keys.forEach(function(k){
      var vals = members.map(function(m){ return m[k]||'-'; });
      var unique = vals.filter(function(v,i,a){ return a.indexOf(v)===i; });
      if(unique.length > 1) diffs.push(labels[k]);
    });
    return diffs;
  }

  var dupHtml = '';
  if(dupGroups.length === 0){
    dupHtml = '<div class="miss-empty">✅ 중복 이름 없음</div>';
  } else {
    dupGroups.forEach(function(name){
      var members = nameMap[name].slice().sort(function(a,b){
        return (a.submitAt||'').localeCompare(b.submitAt||'');
      });
      var diffs = diffFields(members);

      dupHtml += '<div class="dup-group">'
        +'<div class="dup-group-hd">👤 '+esc(name)
        +' <span style="font-size:10px;background:rgba(180,80,20,0.12);color:#8a3800;border:1px solid rgba(180,80,20,0.2);border-radius:8px;padding:1px 7px;">'+members.length+'건</span>'
        +(diffs.length
          ? ' <span style="font-size:10px;color:rgba(80,90,130,0.6);font-weight:400;">차이: '+diffs.join(' · ')+'</span>'
          : ' <span style="font-size:10px;color:rgba(150,50,50,0.7);font-weight:400;">⚠️ 완전 중복</span>')
        +'</div>';

      members.forEach(function(d){
        var ids = d.ids ? ' ('+d.ids+')' : '';
        var date = (d.submitAt||'').substring(5,10).replace('-','/'); // MM/DD

        // 각 행의 차이 필드 값만 강조해서 표시
        var diffVals = [];
        if(diffs.indexOf('목장')  >=0 && d.moksang) diffVals.push({label:'목장', val:d.moksang});
        if(diffs.indexOf('사역팀')>=0 && d.mteam)   diffVals.push({label:'사역팀', val:d.mteam});
        if(diffs.indexOf('일정')  >=0 && d.sched)   diffVals.push({label:'일정', val:d.sched});
        if(diffs.indexOf('차량')  >=0 && d.trans)   diffVals.push({label:'차량', val:d.trans});
        if(diffs.indexOf('숙소')  >=0 && d.accom)   diffVals.push({label:'숙소', val:d.accom});
        if(diffs.indexOf('마을')  >=0 && d.village) diffVals.push({label:'마을', val:d.village});
        if(diffs.indexOf('목자')  >=0 && d.pastor)  diffVals.push({label:'목자', val:d.pastor});

        // 요약 줄: 이름(식별) - 목장명 - 등록일 - [차이항목들]
        var summaryParts = [
          '<span style="font-weight:700;color:#1a1e3a;">'+esc(d.name)+esc(ids)+'</span>',
          '<span style="color:rgba(60,70,110,0.8);">'+esc(d.moksang||'-')+'</span>',
          '<span style="color:rgba(100,110,150,0.7);">'+esc(date)+'</span>'
        ];
        diffVals.forEach(function(df){
          summaryParts.push(
            '<span style="background:rgba(180,80,20,0.1);color:#8a3800;border:1px solid rgba(180,80,20,0.2);'
            +'border-radius:4px;padding:1px 6px;font-size:10px;font-weight:700;">'+esc(df.val)+'</span>'
          );
        });

        dupHtml += '<div class="dup-row" id="duprow-'+esc(d.rno)+'">'
          +'<div class="dup-chk" id="dupchk-'+esc(d.rno)+'" onclick="toggleDupChk(&apos;'+esc(d.rno)+'&apos;)"></div>'
          +'<div class="dup-info" style="flex:1;">'
          +'<div style="display:flex;align-items:center;gap:6px;flex-wrap:wrap;">'
          +summaryParts.join('<span style="color:rgba(150,160,180,0.5);font-size:11px;">—</span>')
          +(isYouth(d)?'<span style="font-size:10px;padding:1px 5px;border-radius:3px;background:rgba(255,140,0,0.12);color:#b85c00;border:1px solid rgba(255,140,0,0.2);font-weight:700;">🎒'+esc(youthGrade(d))+'</span>':'')
          +'</div>'
          +'<div style="font-size:10px;color:rgba(100,110,150,0.6);margin-top:3px;">'+esc(d.rno)+'</div>'
          +'</div>'
          +'</div>';
      });
      dupHtml += '</div>';
    });
  }
  // ── 가족매칭 보류목록 섹션 ──
  var holdHtml = '';
  if(!holdData||holdData.length===0){
    holdHtml = '<div class="miss-empty">✅ 보류 항목 없음</div>';
  } else {
    // 같은 rno가 여러 구분으로 등록된 경우 모두 표시
    holdHtml = holdData.map(function(h,i){
      var typeColor = h.type.indexOf('중복')>=0||h.type.indexOf('이상')>=0
        ? '#b01010' : '#8a3800';
      var typeBg = h.type.indexOf('중복')>=0||h.type.indexOf('이상')>=0
        ? 'rgba(180,16,16,0.08)' : 'rgba(180,80,20,0.08)';
      return '<div class="miss-card" onclick="openMissDetail(&apos;'+esc(h.rno)+'&apos;)">'
        +'<div class="miss-num" style="background:linear-gradient(135deg,#8a3800,#6a2800);">'+(i+1)+'</div>'
        +'<div class="miss-info" style="flex:1;">'
        +'<div class="miss-name">'+esc(h.name)
          +(h.rno?'<span style="font-size:10px;color:#888;font-weight:400;margin-left:6px;">'+esc(h.rno)+'</span>':'')
          +'</div>'
        +'<div class="miss-sub" style="margin-top:3px;">'
          +'<span style="background:'+typeBg+';color:'+typeColor+';border:1px solid '+typeBg+';'
          +'border-radius:4px;padding:1px 6px;font-size:10px;font-weight:700;">'+esc(h.type)+'</span>'
          +'</div>'
        +'<div class="miss-sub" style="margin-top:4px;color:#666;font-size:11px;">'+esc(h.detail)+'</div>'
        +'</div>'
        +editBtn(h.rno)
        +'</div>';
    }).join('');
  }

  // ── 납부 이름 중복 감지 ──
  var payNameMap = {};
  allData.forEach(function(d){
    var key = (d.name||'').trim();
    if(!key) return;
    if(!payNameMap[key]) payNameMap[key] = [];
    payNameMap[key].push(d);
  });
  var payDupGroups = Object.keys(payNameMap).filter(function(name){
    var members = payNameMap[name];
    if(members.length < 2) return false;
    return members.some(function(m){ return payData[m.rno] && payData[m.rno].status; });
  }).sort();
  var payDupHtml = '';
  if(payDupGroups.length === 0){
    payDupHtml = '<div class="miss-empty">✅ 납부 이름 중복 없음</div>';
  } else {
    var stLabel = function(st){ return st==='paid'?'✅ 납부':st==='exempt'?'🔖 면제':'⬜ 미납'; };
    var stColor = function(st){ return st==='paid'?'#2e7d32':st==='exempt'?'#7b1fa2':'#9e9e9e'; };
    payDupGroups.forEach(function(name){
      var members = payNameMap[name].slice().sort(function(a,b){ return (a.submitAt||'').localeCompare(b.submitAt||''); });
      payDupHtml += '<div class="dup-group"><div class="dup-group-hd">👤 '+esc(name)
        +' <span style="font-size:10px;background:rgba(198,40,40,0.12);color:#c62828;border:1px solid rgba(198,40,40,0.25);border-radius:8px;padding:1px 7px;">'+members.length+'건</span></div>';
      members.forEach(function(d){
        var pay=payData[d.rno]||{}, st=pay.status||'unpaid';
        var payDate=pay.date?pay.date.slice(5).replace('-','/').replace(/^0(\d)/,'$1'):'';
        payDupHtml += '<div class="dup-row"><div class="dup-info" style="flex:1;">'
          +'<div style="display:flex;align-items:center;gap:6px;flex-wrap:wrap;">'
          +'<span style="font-weight:700;color:#1a1e3a;">'+esc(d.name)+'</span>'
          +'<span style="color:rgba(60,70,110,0.8);">'+esc(d.moksang||'-')+'</span>'
          +'<span style="color:rgba(100,110,150,0.7);">'+esc(d.village||'-')+'</span>'
          +'<span style="font-weight:700;color:'+stColor(st)+';">'+stLabel(st)+(payDate?' ('+payDate+')':'')+'</span>'
          +(d.phone?'<span style="font-size:10px;color:rgba(80,90,130,0.7);">📞 '+esc(d.phone)+'</span>':'')
          +'</div><div style="font-size:10px;color:rgba(100,110,150,0.6);margin-top:3px;">'+esc(d.rno)+'</div>'
          +'</div>'+editBtn(d.rno)+'</div>';
      });
      payDupHtml += '</div>';
    });
  }

  document.getElementById('missPanel').innerHTML =
    '<div style="padding:8px 0 12px;font-size:11px;font-weight:700;color:rgba(60,70,100,0.6);letter-spacing:1px;">총 '+allData.length+'명 · 확인 필요 항목</div>'
    +'<div class="dup-section"><div class="dup-sec-title">🔁 이름 중복 <span class="dup-count">'+dupGroups.length+'그룹</span></div>'+dupHtml+'</div>'
    +'<div class="dup-section" style="border:1px solid rgba(198,40,40,0.2);border-radius:10px;margin-bottom:10px;overflow:hidden;box-shadow:0 2px 8px rgba(198,40,40,0.06);">'
    +'<div class="dup-sec-title" style="background:#fdecea;color:#c62828;border-bottom:1px solid rgba(198,40,40,0.15);">💰 납부 이름 중복 <span class="dup-count" style="background:rgba(198,40,40,0.1);color:#c62828;border-color:rgba(198,40,40,0.25);">'+payDupGroups.length+'그룹</span></div>'
    +'<div style="padding:8px 14px;background:rgba(198,40,40,0.03);border-bottom:1px solid rgba(198,40,40,0.08);font-size:11px;color:rgba(150,30,30,0.75);">📋 납부 탭에서 동일 이름으로 복수 등록된 항목입니다. 수정 또는 중복 삭제 여부를 확인하세요</div>'
    +payDupHtml+'</div>'
    +'<div class="miss-section"><div class="miss-sec-title">⚠️ 주민등록번호 오류 의심 <span class="miss-count">'+ssnIssues.length+'명</span></div>'
    +'<div style="padding:8px 14px;background:rgba(32,80,200,0.04);border-bottom:1px solid rgba(32,80,200,0.08);font-size:11px;color:rgba(32,80,200,0.7);">📋 자릿수 오류 또는 주민번호-신청서 성별 불일치</div>'
    +makeIssueCards(ssnIssues)+'</div>'
    +'<div class="miss-section"><div class="miss-sec-title">⚠️ 주민등록번호 미등록 <span class="miss-count">'+noSsn.length+'명</span></div>'
    +'<div style="padding:8px 14px;background:rgba(32,80,200,0.04);border-bottom:1px solid rgba(32,80,200,0.08);font-size:11px;color:rgba(32,80,200,0.7);">📋 실제 번호는 구글시트에서 확인하세요</div>'
    +makeCards(noSsn)+'</div>'

// ── XSS 방지 ──
function esc(s){ return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

// ── 청소년 판별 (비고란에 초/중/고 학년 기재된 경우) ──
// ── 주민등록번호로 학년 추정 (중3 이하만) ──
function gradeFromSsn(ssn) {
  if (!ssn) return '';
  var s = ssn.replace(/[^0-9]/g, '');
  if (s.length < 7) return '';
  var yy = parseInt(s.slice(0, 2), 10);
  var g7 = parseInt(s[6], 10);
  // 7번째 자리: 3,4 = 2000년대생 / 1,2 = 1900년대생
  var birthYear;
  if (g7 === 3 || g7 === 4) birthYear = 2000 + yy;
  else if (g7 === 1 || g7 === 2) birthYear = 1900 + yy;
  else return '';
  // 학년 = 현재연도 - 출생연도 - 6
  // 예) 2019년생 → 2026-2019-6=1 → 초1, 2011년생 → 2026-2011-6=9 → 중3
  var curYear = new Date().getFullYear();
  var schoolYear = curYear - birthYear - 6;
  if (schoolYear < 1) return '유치'; // 미취학
  if (schoolYear <= 6) return '초' + schoolYear;
  if (schoolYear === 7) return '중1';
  if (schoolYear === 8) return '중2';
  if (schoolYear === 9) return '중3';
  return ''; // 고등학생 이상은 표시 안 함
}
function isYouth(d) {
  // note 필드 우선
  if (d.note && (/[초중고][0-9]/.test(d.note) || /유치|유아|어린이/.test(d.note))) return true;
  // ssn으로 추정
  if (gradeFromSsn(d.ssn)) return true;
  return false;
}
function youthGrade(d) {
  // note 필드 우선
  if (d.note) {
    var m = d.note.match(/([초중고][0-9]|유치|유아|어린이)/);
    if (m) return m[0];
  }
  // ssn으로 추정
  var g = gradeFromSsn(d.ssn);
  return g;
}

var payData = {};  // { rno: { status, amount, date, memo } }

// GAS에서 payData 로드 (processData 호출 시 병합)
function loadPayDataFromServer(serverPayData) {

  });

// 변경된 납부 정보를 GAS에 저장
function savePayData(rno) {
  if (!rno || !payData[rno]) return;
  var d = payData[rno];
  // allData에서 이름과 계산 금액 조회
  var member = null;
  for (var i = 0; i < allData.length; i++) {
    if (allData[i].rno === rno) { member = allData[i]; break; }
  }
  var memberName = member ? (member.name || '') : '';
  var amountCalc = member ? getFee(member) : 100000;
  var rows = [{
    rno         : rno,
    status      : d.status || 'unpaid',
    amount      : d.amount || 0,
    date        : d.date   || '',
    memo        : d.memo   || '',
    name        : memberName,
    amount_calc : amountCalc
  }];
  fetch(GAS_URL, {
    method: 'POST',
    headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
    body: 'data=' + encodeURIComponent(JSON.stringify({
      action: 'savePay',
      pw: _pw,
      rows: rows
    }))
  }).catch(function(e){ console.warn('납부 저장 오류:', e); });
}

function getFee(d){
  if(!d.note) return 100000;
  if(/초[1-6]|유치|유아|어린이/.test(d.note)) return 80000;
  return 100000;
}
function fmtWon(n){ return n.toLocaleString('ko-KR')+'원'; }

// ── 납부 엑셀 내보내기 ──
function exportPayExcel() {
  var headers = ['관리번호','그룹번호','이름','성별','관계','마을','목장','사역팀','일정','차량','납부상태','납부금액','납입일','비고'];
  var rows = [];

  allData.forEach(function(d) {
    var pay  = payData[d.rno] || {};
    var st   = pay.status || 'unpaid';
    var stKo = st === 'paid' ? '납부' : st === 'exempt' ? '면제' : '미납';
    var amt  = st === 'paid' ? getFee(d) : (st === 'exempt' ? 0 : '');
    var date = pay.date ? pay.date.slice(5).replace('-', '/').replace(/^0(\d)/, '$1') : '';
    rows.push({
      '관리번호': d.rno,
      '그룹번호': d.gno,
      '이름':     d.name,
      '성별':     d.gender,
      '관계':     d.rel,
      '마을':     d.village || '',
      '목장':     d.moksang || '',
      '사역팀':   d.mteam   || '',
      '일정':     d.sched   || '',
      '차량':     d.trans   || '',
      '납부상태': stKo,
      '납부금액': amt !== '' ? amt : '',
      '납입일':   date,
      '비고':     d.note    || ''
    });
  });

  var ws = XLSX.utils.json_to_sheet(rows, { header: headers });

  // 열 너비 설정
  ws['!cols'] = [
    {wch:16},{wch:14},{wch:10},{wch:6},{wch:8},
    {wch:10},{wch:16},{wch:12},{wch:16},{wch:8},
    {wch:8},{wch:10},{wch:8},{wch:12}
  ];

  // 헤더 행 스타일 (배경색·굵게)
  var range = XLSX.utils.decode_range(ws['!ref']);
  for (var C = range.s.c; C <= range.e.c; C++) {
    var hdr = XLSX.utils.encode_cell({ r: 0, c: C });
    if (!ws[hdr]) continue;
    ws[hdr].s = {
      fill: { fgColor: { rgb: '1A3AB0' } },
      font: { bold: true, color: { rgb: 'FFFFFF' }, sz: 11 },
      alignment: { horizontal: 'center', vertical: 'center' }
    };
  }

  // 납부상태 셀 색상
  for (var R = 1; R <= range.e.r; R++) {
    var stCell = XLSX.utils.encode_cell({ r: R, c: 10 }); // 납부상태 열
    if (ws[stCell]) {
      var v = ws[stCell].v;
      var rgb = v === '납부' ? 'C8E6C9' : v === '면제' ? 'E1BEE7' : 'BBDEFB';
      ws[stCell].s = { fill: { fgColor: { rgb: rgb } }, alignment: { horizontal: 'center' } };
    }
    // 금액 오른쪽 정렬
    var amtCell = XLSX.utils.encode_cell({ r: R, c: 11 });
    if (ws[amtCell] && ws[amtCell].v !== '') {
      ws[amtCell].s = { alignment: { horizontal: 'right' } };
      ws[amtCell].t = 'n';
    }
  }

  var wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, ws, '납부현황');

  // 마을별 시트 추가
  var villages = [];
  allData.forEach(function(d){ if(d.village && villages.indexOf(d.village)<0) villages.push(d.village); });
  villages.sort().forEach(function(v) {
    var vRows = rows.filter(function(r){ return r['마을'] === v; });
    if (!vRows.length) return;
    var vws = XLSX.utils.json_to_sheet(vRows, { header: headers });
    vws['!cols'] = ws['!cols'];
    XLSX.utils.book_append_sheet(wb, vws, v);
  });

  var now = new Date();
  var ts  = now.getFullYear()
    + String(now.getMonth()+1).padStart(2,'0')
    + String(now.getDate()).padStart(2,'0');
  XLSX.writeFile(wb, 'MET2026_납부현황_' + ts + '.xlsx');
}

// gno가 2026-G로 시작하면 가족, 2026-A로 시작하면 개인
// 번호 prefix로 신청유형 판별
// 2026-A: 개인, 2026-F: 가족, 2026-G: 단체
function gnoType(gno){
  if(!gno) return 'individual';
  if(/^2026-F/i.test(gno)) return 'family';
  if(/^2026-G/i.test(gno)) return 'group';
  return 'individual';
}
function isGnoFamily(gno){ return /^2026-F/i.test(gno)||/^2026-G/i.test(gno); }
function isGnoGroup(gno){  return /^2026-G/i.test(gno); }

function buildGroups(data) {
  var seen={}, groups=[];
  data.forEach(function(d){
    var gno=d.gno||d.rno;
    if(seen[gno]) return;
    seen[gno]=true;
    // 가족(2026-G): gno 공유 멤버 전원, 개인(2026-A): 본인만
    var members = isGnoFamily(gno)
      ? allData.filter(function(x){ return x.gno===gno; })
      : [d];  // A: 개인, F: 가족, G: 단체
    members.sort(function(a,b){
      var relOrder={'본인':0,'배우자':1,'부모':2,'자녀':3,'기타':4,'-':5,'':5};
      var ra=relOrder[a.rel]!==undefined?relOrder[a.rel]:5;
      var rb=relOrder[b.rel]!==undefined?relOrder[b.rel]:5;
      if(ra!==rb) return ra-rb;
      var ga=(a.gender||'').indexOf('남')>=0?0:1;
      var gb=(b.gender||'').indexOf('남')>=0?0:1;
      return ga-gb;
    });
    // 대표의 명단 인덱스 (명단 번호순 정렬용)
    var repIdx=allData.indexOf(members[0]);
    groups.push({ gno:gno, members:members, idx:repIdx, isFamily:isGnoFamily(gno), isGroup:isGnoGroup(gno), appType:gnoType(gno) });
  });

  // ── 가족DB 기반 2차 병합: 서로 다른 gno라도 family_id가 같으면 한 그룹으로 합침 ──
  // (예: 개인으로 각자 신청한 부부가 가족DB에서 같은 family_id로 매칭된 경우)
  var byFamily={}, merged=[];
  groups.forEach(function(g){
    // family_id 병합은 단체(2026-G) 그룹 제외하고 적용 (개인/가족 모두 대상)
    if(g.isGroup){ merged.push(g); return; }
    var fid = g.members[0].family_id || '';
    if(!fid){ merged.push(g); return; }
    if(byFamily[fid]===undefined){
      byFamily[fid]=merged.length;
      merged.push({gno:g.gno, members:g.members.slice(), idx:g.idx, isFamily:true, isGroup:false, appType:g.appType, familyMerged:true});
    } else {
      var target=merged[byFamily[fid]];
      target.members=target.members.concat(g.members);
      if(g.idx<target.idx) target.idx=g.idx;
    }
  });
  groups=merged;
  groups.forEach(function(g){
    g.members.sort(function(a,b){
      var relOrder={'본인':0,'배우자':1,'부모':2,'자녀':3,'기타':4,'-':5,'':5};
      var ra=relOrder[a.rel]!==undefined?relOrder[a.rel]:5;
      var rb=relOrder[b.rel]!==undefined?relOrder[b.rel]:5;
      if(ra!==rb) return ra-rb;
      var ga=(a.gender||'').indexOf('남')>=0?0:1;
      var gb=(b.gender||'').indexOf('남')>=0?0:1;
      return ga-gb;
    });
  });

  // 명단 번호순 정렬
  groups.sort(function(a,b){ return a.idx-b.idx; });
  return groups;
}

function groupStatus(members){
  var sts=members.map(function(m){ return (payData[m.rno]||{}).status||'unpaid'; });
  if(sts.every(function(s){return s==='paid';})) return 'paid';
  if(sts.every(function(s){return s==='unpaid';})) return 'unpaid';
  if(sts.every(function(s){return s==='exempt';})) return 'exempt';
  return 'partial';
}

function cyclePaySt(rno){
  var cur=(payData[rno]||{}).status||'unpaid';
  var next=cur==='unpaid'?'paid':cur==='paid'?'exempt':'unpaid';
  setPaySt(rno,next);
}
function setPaySt(rno,st){
  if(!payData[rno]) payData[rno]={};
  payData[rno].status=st;
  if(st==='paid'){
    if(!payData[rno].date){
      var t=new Date();
      payData[rno].date=t.getFullYear()+'-'+String(t.getMonth()+1).padStart(2,'0')+'-'+String(t.getDate()).padStart(2,'0');
    }
  } else {
    payData[rno].date='';
  }
  savePayData(rno);
  renderAcct();
}

var _dateSheetRno = '';
function openDateSheet(rno, name, e) {
  if(e) e.stopPropagation();
  _dateSheetRno = rno;
  document.getElementById('dateSheetName').textContent = name + ' 님';
  var cur = (payData[rno]||{}).date || '';
  // 저장값이 YYYY-MM-DD 형태면 MM-DD만 표시
  document.getElementById('dateSheetInput').value = cur.length === 10 ? cur.slice(5) : cur;
  document.getElementById('dateSheetOvl').className = 'date-sheet-ovl show';
  setTimeout(function(){ document.getElementById('dateSheetInput').focus(); }, 120);
}
function closeDateSheet() {
  document.getElementById('dateSheetOvl').className = 'date-sheet-ovl';
  _dateSheetRno = '';
}
function applyDateSheet() {
  var val = document.getElementById('dateSheetInput').value.trim();
  if(!val){ setPayDate(_dateSheetRno,''); closeDateSheet(); return; }
  // MM/DD 또는 MM-DD 형식 허용
  var normalized = val.replace('/','-');
  if(!/^\d{1,2}-\d{2}$/.test(normalized)){
    alert('날짜 형식이 올바르지 않습니다.\n예) 6/15');
    return;
  }
  var parts = normalized.split('-');
  var mm = parts[0].padStart(2,'0'), dd = parts[1].padStart(2,'0');
  setPayDate(_dateSheetRno, '2026-' + mm + '-' + dd);
  closeDateSheet();
}
function confirmClearDate() {
  if(confirm('납입일을 삭제하시겠습니까?')) {
    setPayDate(_dateSheetRno, '');
    closeDateSheet();
  }
}
// 숫자 입력 시 자동 하이픈 삽입
(function(){
  document.addEventListener('input', function(e){
    if(e.target.id !== 'dateSheetInput') return;
    var v = e.target.value.replace(/[^0-9\/]/g,'');
    var d = v.replace(/[^0-9]/g,'');
    if(d.length >= 3) v = d.slice(0,2)+'/'+d.slice(2,4);
    else v = d;
    e.target.value = v;
  });
  document.addEventListener('keydown', function(e){
    if(e.target.id === 'dateSheetInput' && e.key === 'Enter') applyDateSheet();
  });
})();
function setPayDate(rno, dateVal){
  if(!payData[rno]) payData[rno]={};
  payData[rno].date = dateVal || '';
  if(dateVal && (!payData[rno].status || payData[rno].status==='unpaid')){
    payData[rno].status = 'paid';

  savePayData(rno);
  renderAcct();
}

var _spouseDropdownOpen = false;

function openSpouseDropdown() {
  var dd = document.getElementById('spouseDropdown');
  if (!dd) return;
  dd.style.display = 'block';
  _spouseDropdownOpen = true;
  var q = (document.getElementById('ef_spouse') || {}).value || '';
  renderSpouseList(q);
  setTimeout(function(){
    var si = document.getElementById('spouseSearchInput');
    if (si) { si.value = q; si.focus(); }
  }, 80);
}

function closeSpouseDropdown() {
  var dd = document.getElementById('spouseDropdown');
  if (dd) dd.style.display = 'none';
  _spouseDropdownOpen = false;
}

function filterSpouseDropdown(q) {
  var dd = document.getElementById('spouseDropdown');
  if (!dd || dd.style.display === 'none') return;
  // 두 입력란 동기화
  var si = document.getElementById('spouseSearchInput');
  var ei = document.getElementById('ef_spouse');
  if (document.activeElement === ei && si) si.value = q;
  renderSpouseList(q);
}

function renderSpouseList(q) {
  var listEl = document.getElementById('spouseDropdownList');
  if (!listEl) return;
  q = (q || '').trim();

  // 현재 수정 중인 본인 rno 제외
  var selfRno = _currentDetailRno;
  var candidates = allData.filter(function(d){ return d.rno !== selfRno; });

  // 검색어 있으면 필터, 없으면 전체
  if (q) {
    candidates = candidates.filter(function(d){
      return (d.name || '').indexOf(q) >= 0;
    });
  }

  if (!candidates.length) {
    listEl.innerHTML = '<div class="spouse-no-result">검색 결과가 없습니다</div>';
    return;
  }

  // 신청자 DB에 있는 사람 먼저, 나머지 뒤 (모두 allData 기반이므로 전부 신청자)
  // 이름 가나다순 정렬
  candidates.sort(function(a, b){
    return (a.name || '').localeCompare(b.name || '', 'ko');
  });

  var html = '';
  if (!q) html += '<div class="spouse-section-hd">📋 신청자 전체</div>';
  else html += '<div class="spouse-section-hd">🔍 "'+esc(q)+'" 검색 결과 '+candidates.length+'명</div>';

  candidates.forEach(function(d){
    var genderCls = (d.gender || '').indexOf('남') >= 0 ? 'm' : 'f';
    var genderLbl = (d.gender || '').indexOf('남') >= 0 ? '남' : '여';
    var sub = [d.moksang, d.village].filter(Boolean).join(' · ');
    html += '<div class="spouse-item" onclick="selectSpouse(\''+esc(d.name)+'\')">'
      + '<span class="spouse-item-gender '+genderCls+'">'+genderLbl+'</span>'
      + '<span class="spouse-item-name">'+esc(d.name)+'</span>'
      + '<span class="spouse-item-sub">'+esc(sub)+'</span>'
      + '</div>';
  });
  listEl.innerHTML = html;
}

function selectSpouse(name) {
  var ei = document.getElementById('ef_spouse');
  if (ei) ei.value = name;
  closeSpouseDropdown();
}

  var em = document.getElementById('editMsg');

}

function saveEdit() {
  if (!canEdit()) return;
  var rno = _currentDetailRno;
  if (!rno) return;

  var fields = {};
  var ssnError = '';
  EDIT_FIELD_DEFS.forEach(function(f){
    var el = document.getElementById('ef_'+f.key);
    if (!el) return;
    var v = el.value;
    if (f.key === 'ssnRaw') {
      v = v.replace(/[^0-9]/g,'');
      if (!v) return; // 비워두면 기존값 유지(전송 안 함)
      if (v.length !== 13) { ssnError = '주민등록번호는 13자리 숫자로 입력해주세요.'; return; }
      fields['주민등록번호'] = v.slice(0,6)+'-'+v.slice(6);
      return;
    }
    var header = EDIT_FIELD_TO_HEADER[f.key];
    if (!header) return;
    fields[header] = v;
  });

  if (ssnError) {
    document.getElementById('editMsg').textContent = ssnError;
    document.getElementById('editMsg').className = 'edit-msg error';
    return;
  }

  if (Object.keys(fields).length === 0) {
    document.getElementById('editMsg').textContent = '변경할 내용이 없습니다.';
    document.getElementById('editMsg').className = 'edit-msg';
    return;
  }

  var btn = document.getElementById('editSaveBtn');
  if (btn.disabled) return; // 이중 실행 방지
  btn.disabled = true; btn.textContent = '저장 중...';
  document.getElementById('editMsg').textContent = '';
  document.getElementById('editMsg').className = 'edit-msg';

  var editor = currentUser ? (currentUser.name + ':' + currentUser.phone) : '';
  var ps = 'data=' + encodeURIComponent(JSON.stringify({
    action: 'updateRow', rno: rno, fields: fields, pw: _pw, editor: editor
  }));

  fetch(GAS_URL, { method:'POST', headers:{'Content-Type':'application/x-www-form-urlencoded'}, body: ps })
    .then(function(r){ return r.json(); })
    .then(function(res){
      if (res.result === 'ok') {
        var n = res.updated || 0;
        if (n > 0) {
          // 저장 성공: 즉시 닫기
          var prevTab = _editFromTab || 'list';
          _editFromTab = null;
          closeEdit();
          document.getElementById('detailOvl').className = 'detail-ovl';
          document.body.style.position = '';
          document.body.style.top = '';
          document.body.style.left = '';
          document.body.style.right = '';
          document.body.style.width = '';
          window.scrollTo(0, _scrollY);
          loadData(prevTab);
        } else {
          btn.disabled = false; btn.textContent = '💾 저장';
          document.getElementById('editMsg').textContent = '변경된 내용이 없습니다.';
          document.getElementById('editMsg').className = 'edit-msg';
        }
      } else {
        btn.disabled = false; btn.textContent = '💾 저장';
        document.getElementById('editMsg').textContent = '저장 실패: ' + (res.message || '알 수 없는 오류');
        document.getElementById('editMsg').className = 'edit-msg error';
      }
    })
    .catch(function(e){
      btn.disabled = false; btn.textContent = '💾 저장';
      document.getElementById('editMsg').textContent = '네트워크 오류: ' + e.message;
      document.getElementById('editMsg').className = 'edit-msg error';
    });
}

function syncFamilyIdFromAdmin(){
  if(!currentUser||currentUser.role!=='super'){alert('슈퍼바이저만 실행할 수 있습니다.');return;}
  var btn = document.getElementById('syncFamilyBtn');
  btn.disabled = true; btn.textContent = '처리 중...';
  var pw = currentUser.name + ':' + currentUser.phone;
  fetch(GAS_URL + '?action=syncFamily&pw=' + encodeURIComponent(pw))
    .then(function(r){ return r.json(); })
    .then(function(res){
      btn.disabled = false; btn.textContent = '👨‍👩‍👧 가족ID 일괄적용';
      if(res.result === 'ok'){
        alert('완료! 가족ID가 적용되었습니다.\n페이지를 새로고침합니다.');
        loadData('family');
      } else {
        alert('오류: ' + (res.message || '알 수 없는 오류'));
      }
    })
    .catch(function(e){
      btn.disabled = false; btn.textContent = '👨‍👩‍👧 가족ID 일괄적용';
      alert('네트워크 오류: ' + e.message);
    });
}

function renderFamily(){
  var panel = document.getElementById('familyPanel');
  if(!panel) return;

  // ── 1. family_id별 그룹핑 ──
  // family_id 있으면 해당 값으로, 없으면 개인(단독)으로 처리 (단독은 표시 안 함)
  var byFid = {};
  allData.forEach(function(d){
    var fid = d.family_id || '';
    if(!fid) return;
    if(!byFid[fid]) byFid[fid] = [];
    byFid[fid].push(d);
  });

  // ── 1-B. family_id 없어도 배우자성명 상호 매칭으로 가족그룹 구성 ──
  // A의 spouse = B.name  &&  B의 spouse = A.name  → 같은 그룹으로 묶음
  // 또는 A의 spouse = B.name만 있어도 B가 allData에 존재하면 묶음
  var spouseGrouped = {}; // rno → 합성 fid (spouse-RNOMIN_RNOMAX)
  allData.forEach(function(d){
    if(d.family_id) return; // family_id 있는 사람은 이미 위에서 처리됨
    if(spouseGrouped[d.rno]) return; // 이미 묶임
    var sp = (d.spouse || '').trim();
    if(!sp) return;
    // allData에서 이름이 일치하는 상대방 찾기
    var partner = allData.find(function(x){
      return x.rno !== d.rno && (x.name||'') === sp && !x.family_id;
    });
    if(!partner) return;
    if(spouseGrouped[partner.rno]) return;
    // 합성 fid: 두 rno를 정렬해 고유키 생성
    var ids = [d.rno, partner.rno].sort();
    var synFid = 'spouse-' + ids[0] + '_' + ids[1];
    spouseGrouped[d.rno] = synFid;
    spouseGrouped[partner.rno] = synFid;
    if(!byFid[synFid]) byFid[synFid] = [];
    byFid[synFid].push(d);
    byFid[synFid].push(partner);
  });

  // ── 2. 배우자성명 자동보완 맵 구성 ──
  Object.keys(byFid).forEach(function(fid){
    var members = byFid[fid];
    var couple = members.filter(function(m){
      return m.rel==='본인'||m.rel==='배우자'||m.rel==='-'||m.rel==='';
    });
    if(couple.length === 2){
      var m0 = couple[0], m1 = couple[1];
      if(!m0.spouse && m1.name){ m0._autoSpouse = m1.name; }
      if(!m1.spouse && m0.name){ m1._autoSpouse = m0.name; }
    }
  });

  var fids = Object.keys(byFid).sort();
  var totalFam = fids.length;
  var totalMem = allData.filter(function(d){ return !!d.family_id; }).length;
  var paidFam  = fids.filter(function(fid){
    return byFid[fid].every(function(m){ return (payData[m.rno]||{}).status==='paid'; });
  }).length;

  // ── 3. 통계 바 + 가족ID 일괄적용 버튼 ──
  var syncBtn = (currentUser&&currentUser.role==='super')
    ? '<div style="padding:0 0 10px;"><button id="syncFamilyBtn" onclick="syncFamilyIdFromAdmin()" style="width:100%;padding:11px;background:linear-gradient(135deg,#1a3a9e,#2050c8);border:none;border-radius:10px;color:#fff;font-size:13px;font-weight:700;cursor:pointer;font-family:inherit;touch-action:manipulation;">👨‍👩‍👧 가족ID 일괄적용 (배우자성명 기반)</button></div>'
    : '';
  var html = syncBtn + '<div class="fam-stat-bar">'
    + '<span class="fam-stat-chip">👨‍👩‍👧 가족그룹 '+totalFam+'팀</span>'
    + '<span class="fam-stat-chip">👥 가족참가 '+totalMem+'명</span>'
    + '<span class="fam-stat-chip" style="background:rgba(46,125,50,0.08);border-color:rgba(46,125,50,0.3);color:#2e7d32;">✅ 납부완료 '+paidFam+'팀</span>'
    + '<span class="fam-stat-chip" style="background:rgba(230,81,0,0.07);border-color:rgba(230,81,0,0.25);color:#e65100;">⏳ 미완료 '+(totalFam-paidFam)+'팀</span>'
    + '</div>';

  // ── 4. 가족그룹 카드 ──
  fids.forEach(function(fid){
    var members = byFid[fid];
    // 구성원 정렬: 본인 → 배우자 → 부모 → 자녀 → 기타, 동일 관계 내 남→여
    var relOrder = {'본인':0,'배우자':1,'부모':2,'자녀':3,'기타':4,'-':5,'':5};
    members.sort(function(a,b){
      var ra=relOrder[a.rel]!==undefined?relOrder[a.rel]:5;
      var rb=relOrder[b.rel]!==undefined?relOrder[b.rel]:5;
      if(ra!==rb) return ra-rb;
      var ga=(a.gender||'').indexOf('남')>=0?0:1;
      var gb=(b.gender||'').indexOf('남')>=0?0:1;
      return ga-gb;
    });

    // 납부현황
    var paidCnt  = members.filter(function(m){ return (payData[m.rno]||{}).status==='paid'; }).length;
    var totalFee = members.reduce(function(s,m){ return s+getFee(m); }, 0);
    var paidFee  = members.reduce(function(s,m){
      return s+((payData[m.rno]||{}).status==='paid'?getFee(m):0);
    }, 0);
    var payStatus = paidCnt===members.length?'paid':paidCnt>0?'partial':'unpaid';
    var payLabel  = payStatus==='paid'?'✅ 완납':payStatus==='partial'?'⏳ '+(paidCnt)+'/'+members.length:'⬜ 미납';

    // 대표 목장 (첫 번째 멤버 기준)
    var rep = members[0];

    html += '<div class="fam-group">';
    html += '<div class="fam-group-hd">'
      + '<span class="fam-group-id">'+(fid.indexOf('spouse-')===0?'💑 배우자매칭':esc(fid))+'</span>'
      + '<span class="fam-group-cnt">'+members.length+'명</span>'
      + (rep.moksang?'<span class="fam-group-moksang">'+esc(rep.moksang)+'</span>':'')
      + '<span class="fam-group-pay '+payStatus+'">'+payLabel+' '+fmtWon(paidFee)+'/'+fmtWon(totalFee)+'</span>'
      + '</div>';

    members.forEach(function(m){
      var rel = m.rel||'-';
      var relCls = rel==='배우자'?'spouse':rel==='자녀'||rel==='부모'?'child':'';
      var spouseVal = m.spouse || m._autoSpouse || '';
      var spouseCls = (!m.spouse && m._autoSpouse) ? 'auto' : '';
      var spouseHint = spouseCls ? ' (자동)' : '';
      var pay = payData[m.rno]||{};
      var payCls = pay.status==='paid'?'paid':'unpaid';
      var payMark = pay.status==='paid'?'✅':'⬜';
      // 자녀 학년 표기
      var youth = isYouth(m);
      var grade = youth ? youthGrade(m) : '';
      var youthBadge = youth
        ? ' 🎒<span style="font-size:10px;font-weight:700;color:#b85c00;background:rgba(255,140,0,0.12);border:1px solid rgba(255,140,0,0.25);border-radius:4px;padding:1px 5px;margin-left:2px;">'+esc(grade)+'</span>'
        : '';

      html += '<div class="fam-member">'
        + '<span class="fam-member-rel '+relCls+'">'+(youth?'🎒 ':'')+esc(rel)+'</span>'
        + '<span class="fam-member-name">'+esc(m.name)+youthBadge+'</span>'
        + '<span class="fam-member-info">'+esc(m.gender||'-')+' · '+esc((m.sched||'-').replace(/\([^)]*\)/g,'').trim())+'</span>'
        + (spouseVal
            ? '<span class="fam-member-spouse '+spouseCls+'">'
              +'💑 '+esc(spouseVal)+spouseHint+'</span>'
            : '')
        + '<span class="fam-member-pay '+payCls+'">'+payMark+'</span>'
        + '</div>';
    });

    html += '</div>'; // .fam-group
  });

  if(fids.length === 0){
    html += '<div class="fam-no-family">가족DB에 등록된 그룹이 없습니다.<br>가족DB 시트를 확인해주세요.</div>';
  }

  panel.innerHTML = html;
}

// ── 수정로그 탭 ──
// ══════════════════════════════════════════

function loadEditLog() {
  var panel = document.getElementById('editlogPanel');
  if (!panel) return;
  if (!canEdit()) {
    panel.innerHTML = '<div class="editlog-empty">접근 권한이 없습니다.</div>';
    return;
  }
  panel.innerHTML = '<div class="loading"><div class="spinner"></div><div class="loading-txt">수정로그를 불러오는 중입니다…</div></div>';

  var url = GAS_URL + '?action=editLog&pw=' + encodeURIComponent(currentUser.name + ':' + currentUser.phone);
  fetch(url)
    .then(function(r){ return r.json(); })
    .then(function(res){
      if (res.result !== 'ok') {
        panel.innerHTML = '<div class="editlog-empty">⚠️ ' + esc(res.message||'조회 실패') + '</div>';
        return;
      }
      renderEditLog(res.data || []);
    })
    .catch(function(e){
      panel.innerHTML = '<div class="editlog-empty">⚠️ 네트워크 오류: ' + esc(e.message) + '</div>';
    });
}

function renderEditLog(logs) {
  var panel = document.getElementById('editlogPanel');
  if (!logs.length) {
    panel.innerHTML = '<div class="editlog-empty">📝 수정 내역이 없습니다.</div>';
    return;
  }
  var myName = currentUser ? currentUser.name : '';
  var selfCount = logs.filter(function(l){ return (l.editor ? l.editor.split(':')[0] : '') === myName; }).length;
  var html = '<div style="padding:4px 0 10px;font-size:11px;font-weight:700;color:rgba(60,70,100,0.6);letter-spacing:1px;">'
    + '총 '+logs.length+'건의 수정 내역 (최신순)'
    + (selfCount > 0 ? ' · <span style="color:var(--primary);">내 수정 '+selfCount+'건</span>' : '')
    + '</div>';
  logs.forEach(function(log){
    var editorName = log.editor ? log.editor.split(':')[0] : '-';
    var isSelf = myName && (editorName === myName);
    html += '<div class="editlog-card'+(isSelf?' self':'')+'">'
      + '<div class="editlog-top">'
      + '<div class="editlog-name">'+esc(log.name||'-')+(isSelf?'<span class="editlog-self-badge">👤 내 수정</span>':'')+'</div>'
      + '<div class="editlog-rno">'+esc(log.rno||'')+'</div>'
      + '</div>'
      + '<div><span class="editlog-field">'+esc(log.field||'')+'</span></div>'
      + '<div class="editlog-diff"><span class="before">'+(log.before?esc(log.before):'(빈값)')+'</span> → <span class="after">'+(log.after?esc(log.after):'(빈값)')+'</span></div>'
      + '<div class="editlog-meta">'+esc(log.time||'')+' · 수정자: '+esc(editorName)+'</div>'
      + '</div>';
  });
  panel.innerHTML = html;
}

// ── 가족묶기 선택 모드 ──
// ══════════════════════════════════════════
var _selMode = false;
var _selRnos = {};
var _longPressTimer = null;

function enterSelMode(triggerRno) {
  _selMode = true;
  _selRnos = {};
  document.getElementById('listWrap').classList.add('sel-mode-active');
  if (triggerRno) toggleSelCard(triggerRno);
  updateSelBar();
}

function exitSelMode() {
  _selMode = false;
  _selRnos = {};
  document.getElementById('listWrap').classList.remove('sel-mode-active');
  document.querySelectorAll('.card.selected').forEach(function(c){ c.classList.remove('selected'); });
  updateSelBar();
}

function toggleSelCard(rno) {
  var card = document.getElementById('card-' + rno);
  if (!card) return;
  if (_selRnos[rno]) {
    delete _selRnos[rno];
    card.classList.remove('selected');
  } else {
    _selRnos[rno] = true;
    card.classList.add('selected');
  }
  updateSelBar();
}

function updateSelBar() {
  var bar = document.getElementById('linkFamBar');
  var cnt = Object.keys(_selRnos).length;
  document.getElementById('linkFamCount').textContent = cnt + '명 선택';
  var btn = bar.querySelector('.link-fam-btn');
  if (cnt >= 2) {
    bar.classList.add('show');
    btn.disabled = false; btn.style.opacity = '1';
  } else if (cnt === 1) {
    bar.classList.add('show');
    btn.disabled = true; btn.style.opacity = '0.45';
  } else {
    bar.classList.remove('show');
  }
}

function onCardClick(event, idx) {
  if (_selMode) {
    var d = filtered[idx];
    if (d) toggleSelCard(d.rno);
  } else {
    openDetail(idx);
  }
}

function startLongPress(event, rno) {
  cancelLongPress();
  _longPressTimer = setTimeout(function() {
    _longPressTimer = null;
    if (!_selMode) enterSelMode(rno);
    else toggleSelCard(rno);
  }, 500);
}
function cancelLongPress() {
  if (_longPressTimer) { clearTimeout(_longPressTimer); _longPressTimer = null; }
}
function onCardLongPress(event, rno) {
  event.preventDefault();
  if (!_selMode) enterSelMode(rno);
  else toggleSelCard(rno);
}

function doLinkFamily() {
  var rnos = Object.keys(_selRnos);
  if (rnos.length < 2) { showToast('2명 이상 선택하세요'); return; }
  if (!canEdit()) { showToast('슈퍼바이저 권한이 필요합니다'); return; }

  var alreadyLinked = rnos.filter(function(r){
    return allData.some(function(d){ return d.rno === r && d.family_id; });
  });
  var names = rnos.map(function(r){
    var d = allData.find(function(x){ return x.rno === r; });
    return d ? d.name : r;
  });
  var msg = names.join(', ') + '\n\n위 ' + rnos.length + '명을 가족으로 묶겠습니까?';
  if (alreadyLinked.length > 0) {
    var aNames = alreadyLinked.map(function(r){
      var d = allData.find(function(x){ return x.rno === r; });
      return d ? d.name : r;
    });
    msg += '\n\n⚠️ ' + aNames.join(', ') + '은(는) 이미 가족DB에 등록되어 있습니다.';
  }
  if (!confirm(msg)) return;

  var pw = currentUser.name + ':' + currentUser.phone;
  var bar = document.getElementById('linkFamBar');
  var btn = bar.querySelector('.link-fam-btn');
  btn.textContent = '처리 중…'; btn.disabled = true;

  fetch(GAS_URL, {
    method: 'POST',
    headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
    body: 'data=' + encodeURIComponent(JSON.stringify({
      action: 'linkFamily',
      rnos: rnos,
      pw: pw,
      editor: currentUser.name
    }))
  })
  .then(function(r){ return r.json(); })
  .then(function(res){
    if (res.result === 'ok') {
      showToast('✅ ' + res.familyId + ' 로 가족 등록 완료!');
      exitSelMode();
      loadData();
    } else {
      showToast('⚠️ ' + (res.message || '오류 발생'));
      btn.textContent = '👨‍👩‍👧 가족으로 묶기'; btn.disabled = false;
    }
  })
  .catch(function(e){
    showToast('⚠️ 네트워크 오류: ' + e.message);
    btn.textContent = '👨‍👩‍👧 가족으로 묶기'; btn.disabled = false;
  });
}

</script>
