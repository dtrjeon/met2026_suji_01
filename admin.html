}
function _doExportExcel(){
  var META={
    A01:'2인 침대/침구',A02:'2인 침대/침구',A03:'2인 침대/침구',
    A04:'2인 침대/침구',A05:'2인 침대/침구',A06:'2인 침대/침구',
    A07:'2인 침대/침구',A08:'2인 침대/침구',A09:'2인 침대/침구',
    A10:'2인 침대/침구',A11:'2인 침대/침구',
    B01:'트윈2',B02:'트윈2',B03:'트윈2',B04:'트윈2',B05:'트윈2',
    C01:'트윈1, 침구 2',C02:'트윈1, 침구 2',
    D01:'침구3',D02:'침구3',D03:'침구3',D04:'침구3',D05:'침구3',
    F01:'트윈1, 싱글1, 침구3',F02:'트윈1, 싱글1, 침구3',E01:'침구5'
  };
  // 구글시트와 동일한 타입별 배경색 (ARGB)
  var TYPE_BG={A:'FFDBEAFE',B:'FFDCFCE7',C:'FFFFF0F6',D:'FFFFEDD5',E:'FFEDE9FE',F:'FFFFE4E6'};
  // C타입은 FEF08A였으나 구글시트 실제 #D6E3BC 계열로 수정
  var GENDER_BG={'여':'FFFFF0F6','남':'FFEFF6FF','가족':'FFFFF9C3','─':'FFF8FAFC','혼합':'FFECFDF5'};
  var HDR='FF1E3A8A', CAP='FFFFF0F6', REM='FFDBEAFE';

  function cs(bg,bold,ha,wrap,sz){
    return {
      fill:{patternType:'solid',fgColor:{argb:bg||'FFFFFFFF'}},
      font:{bold:!!bold,name:'맑은 고딕',sz:sz||10,
            color:{argb:bg===HDR?'FFFFFFFF':'FF1E293B'}},
      alignment:{horizontal:ha||'left',vertical:'center',wrapText:!!wrap},
      border:{
        top:{style:'thin',color:{argb:'FFD1D5DB'}},
        bottom:{style:'thin',color:{argb:'FFD1D5DB'}},
        left:{style:'thin',color:{argb:'FFD1D5DB'}},
        right:{style:'thin',color:{argb:'FFD1D5DB'}}
      }
    };
  }

  var wb=XLSX.utils.book_new(), ws={};

  // 구글시트 열너비와 동일 (pt→wch 근사값)
  ws['!cols']=[
    {wch:9},   // A: 방번호    (GS: 70px)
    {wch:10},  // B: 숙소타입  (GS: 80px)
    {wch:6},   // C: 성별      (GS: 50px)
    {wch:6},   // D: 인원      (GS: 50px)
    {wch:7},   // E: 총인원    (GS: 55px)
    {wch:5},   // F: 잔여      (GS: 45px)
    {wch:22},  // G: 팀명      (GS: 180px)
    {wch:44},  // H: 숙소자    (GS: 320px)
    {wch:15},  // I: 수정      (GS: 120px)
  ];

  // 헤더 행 (구글시트와 동일)
  var hdrs=['방번호','숙소타입','성별','인원','총인원','잔여','팀명','숙소자','수정'];
  hdrs.forEach(function(h,ci){
    ws[XLSX.utils.encode_cell({r:0,c:ci})]={v:h,t:'s',s:cs(HDR,true,'center',false,10)};
  });

  // 데이터 행 (구글시트 저장 순서와 동일)
  var order=['A01','A02','A03','A04','A05','A06','A07','A08','A09','A10','A11',
    'B01','B02','B03','B04','B05','C01','C02',
    'D01','D02','D03','D04','D05','F01','F02','E01'];

  order.forEach(function(rid,ri){
    var r=ACCOM_ROOMS.find(function(x){return x.id===rid;});
    if(!r) return;
    var er=ri+1;
    var tbg=TYPE_BG[r.type]||'FFFFFFFF';
    var gbg=GENDER_BG[r.gender]||CAP;
    var cnt=r.members.length;
    var team=cnt===0?'(여유)':accomGetTeam(r.members);
    var membersStr=r.members.join(', ');

    // A: 방번호 - 볼드, 가운데
    ws[XLSX.utils.encode_cell({r:er,c:0})]={v:r.id,       t:'s',s:cs(tbg,true,'center')};
    // B: 숙소타입 - 가운데
    ws[XLSX.utils.encode_cell({r:er,c:1})]={v:r.typeName, t:'s',s:cs(tbg,false,'center')};
    // C: 성별 - 볼드, 가운데, 성별색
    ws[XLSX.utils.encode_cell({r:er,c:2})]={v:r.gender,   t:'s',s:cs(gbg,true,'center')};
    // D: 인원 - 볼드, 가운데
    ws[XLSX.utils.encode_cell({r:er,c:3})]={v:cnt||'',    t:cnt?'n':'s',s:cs(CAP,true,'center')};
    // E: 총인원 - 볼드, 가운데
    ws[XLSX.utils.encode_cell({r:er,c:4})]={v:r.cap,      t:'n',s:cs(CAP,true,'center')};
    // F: 잔여 - 수식, 가운데
    ws[XLSX.utils.encode_cell({r:er,c:5})]={f:'E'+(er+1)+'-D'+(er+1),t:'n',s:cs(REM,true,'center')};
    // G: 팀명
    ws[XLSX.utils.encode_cell({r:er,c:6})]={v:team,       t:'s',s:cs(tbg,false,'left')};
    // H: 숙소자 - 줄바꿈 허용
    ws[XLSX.utils.encode_cell({r:er,c:7})]={v:membersStr, t:'s',s:cs(tbg,false,'left',true)};
    // I: 수정(침구)
    ws[XLSX.utils.encode_cell({r:er,c:8})]={v:META[r.id]||'',t:'s',s:cs(tbg,false,'center')};
  });

  // 합계행 (구글시트와 동일)
  var sr=order.length+1;
  ws[XLSX.utils.encode_cell({r:sr,c:3})]={f:'SUM(D2:D'+sr+')',t:'n',s:cs(CAP,true,'center')};
  ws[XLSX.utils.encode_cell({r:sr,c:4})]={f:'SUM(E2:E'+sr+')',t:'n',s:cs(CAP,true,'center')};
  ws[XLSX.utils.encode_cell({r:sr,c:5})]={f:'E'+(sr+1)+'-D'+(sr+1),t:'n',s:cs(REM,true,'center')};

  // 행 높이 (구글시트와 동일)
  ws['!rows']=[{hpt:21.75}]; // 헤더
  for(var i=0;i<order.length;i++) ws['!rows'].push({hpt:19.5}); // 데이터
  ws['!rows'].push({hpt:19.5}); // 합계

  ws['!ref']=XLSX.utils.encode_range({r:0,c:0},{r:sr,c:8});

  // 파일명 (날짜시각)
  var now=new Date();
  var stamp=now.getFullYear()
    +String(now.getMonth()+1).padStart(2,'0')
    +String(now.getDate()).padStart(2,'0')+'_'
    +String(now.getHours()).padStart(2,'0')
    +String(now.getMinutes()).padStart(2,'0');
  var fname='MET2026_삼척숙소배치표_'+stamp+'.xlsx';

  XLSX.utils.book_append_sheet(wb,ws,'숙소배치표(남녀분리)');
  XLSX.writeFile(wb,fname,{bookType:'xlsx',type:'binary',cellStyles:true});
  accomShowToast('📊 '+fname+' 저장 완료');
}

  alert(msg);
}

// ============================================================
// ★ 차량배치 탭 (전태룡·유원종 전용)
// 버스 2대(1호차/2호차), 각 45인승, 자동 균등배분 + 드래그 수동조정
// 우선순위: 1.가족 2.사역팀 3.개인 — LPT(균등분배) 알고리즘
// 좌석열: A/B열(왼쪽 2인), 통로, C/D열(오른쪽 2인) — 가족은 A·B 또는 C·D로 묶어서 배치
// ============================================================
var VEH_BUS_CAP = 45;
var VEH_VERSION = 'v3.8 (' + '2026-07-05' + ')'; // 요청 반영 확인용 — 배포 후 이 텍스트로 최신 버전 여부 확인

// ── 고정석: 1호차 1번(맨 앞줄 A석) = 고영수 목사님 (자동배분/드래그/초기화와 무관하게 항상 유지) ──
var VEH_FIXED_SEATS = { 1: { 'R1A': '고영수' } };
function vehFindFreeSeat(busNum, excludeSeatId){
  for (var i=0;i<vehSeatLayout.length;i++){
    var sid=vehSeatLayout[i];
    if (sid===excludeSeatId) continue;
    if (!vehData[busNum][sid]) return sid;
  }
  return null;
}
function vehEnforceFixedSeats(){
  Object.keys(VEH_FIXED_SEATS).forEach(function(busKey){
    var busNum = Number(busKey);
    Object.keys(VEH_FIXED_SEATS[busNum]).forEach(function(seatId){
      var name = VEH_FIXED_SEATS[busNum][seatId];
      // 1) 이 사람이 실수로 다른 자리에 들어가 있으면 제거 (중복 탑승 방지)
      [1,2].forEach(function(b){
        Object.keys(vehData[b]).forEach(function(sid){
          if (b===busNum && sid===seatId) return;
          if (vehData[b][sid] === name) vehData[b][sid] = '';
        });
      });
      // 2) 고정석에 다른 사람이 있으면 같은 버스의 빈자리로, 없으면 반대편 버스 빈자리로 옮겨줌
      var cur = vehData[busNum][seatId];
      if (cur && cur !== name) {
        var free = vehFindFreeSeat(busNum, seatId);
        if (free) {
          vehData[busNum][free] = cur;
        } else {
          var otherBus = busNum===1 ? 2 : 1;
          var freeOther = vehFindFreeSeat(otherBus, null);
          if (freeOther) vehData[otherBus][freeOther] = cur;
          // 그래도 자리가 없으면(양쪽 버스 만석) 부득이하게 미배정으로 빠짐
        }
      }
      // 3) 고정석 배정
      vehData[busNum][seatId] = name;
      if (!vehMeta[name]) vehMeta[name] = {type:'individual', team:'', family_id:''};
    });
  });
}

function vehGenSeatLayout(){
  var seats=[];
  for(var r=1;r<=10;r++){
    seats.push('R'+r+'A'); seats.push('R'+r+'B');
    seats.push('R'+r+'C'); seats.push('R'+r+'D');
  }
  for(var b=1;b<=5;b++) seats.push('BACK'+b);
  return seats; // 총 45석 (앞 10줄×4석[A,B,C,D] + 뒷줄 5석)
}
var vehSeatLayout = vehGenSeatLayout();
var vehData = {1:{}, 2:{}};   // {busNum:{seatId:name}}
var vehMeta = {};             // name -> {type, team, family_id}
var vehHistory = [];
var vehDragging = null, vehOverSeat = null;
var vehLoaded = false;
var vehToastTimer;
var vehGroupMode = false;
var vehSelectedSeats = []; // [{bus,seat,name}] 가족묶기 선택모드에서 선택된 좌석
var vehPendingPlace = null; // 미배정 인원 칩을 탭해 선택한 이름 (다음 빈 좌석 탭에서 배치됨)

function vehGetBusRiders(){
  var seen={};
  return allData.filter(function(d){
    if(!d.name) return false;
    var n=d.name.trim();
    if(!n||seen[n]) return false;
    if(!d.trans || d.trans.trim()!=='버스') return false;
    seen[n]=true;
    return true;
  });
}
// 가족현황 탭과 동일한 기준으로 가족그룹을 판정 (family_id 우선, 없으면 배우자성명 상호매칭)
function vehBuildFamilyMap(){
  var map={}; // rno -> 가족키
  allData.forEach(function(d){
    var fid=(d.family_id||'').trim();
    if(fid) map[d.rno]=fid;
  });
  var spouseGrouped={};
  allData.forEach(function(d){
    if((d.family_id||'').trim()) return; // family_id 있는 사람은 이미 처리됨
    if(spouseGrouped[d.rno]) return;
    var sp=(d.spouse||'').trim();
    if(!sp) return;
    var partner=allData.find(function(x){
      return x.rno!==d.rno && (x.name||'')===sp && !(x.family_id||'').trim();
    });
    if(!partner) return;
    if(spouseGrouped[partner.rno]) return;
    var ids=[d.rno, partner.rno].sort();
    var synFid='spouse-'+ids[0]+'_'+ids[1];
    spouseGrouped[d.rno]=synFid;
    spouseGrouped[partner.rno]=synFid;
    map[d.rno]=synFid;
    map[partner.rno]=synFid;
  });
  return map;
}
function vehGetAssignedNames(){
  var s={};
  [1,2].forEach(function(b){
    Object.keys(vehData[b]).forEach(function(seat){
      var n=vehData[b][seat]; if(n) s[n]=true;
    });
  });
  return s;
}
// 특정 버스에 탑승한 인원의 성별/자녀 수 집계
function vehBusGenderStats(busNum){
  var male=0, female=0, child=0, total=0;
  Object.keys(vehData[busNum]).forEach(function(seat){
    var name=vehData[busNum][seat];
    if(!name) return;
    total++;
    var tags=vehPersonTags(name);
    if(tags.gender==='남') male++;
    else if(tags.gender==='여') female++;
    if(tags.isChild) child++;
  });
  return {total:total, male:male, female:female, child:child};
}

function vehAutoAssign(){
  var riders = vehGetBusRiders();
  if(!riders.length){ vehShowToast('⚠️ 버스 탑승자가 없습니다.'); return; }

  try{
  vehData={1:{},2:{}}; vehMeta={}; vehHistory=[]; vehPendingPlace=null;
  var consumed={};
  var units=[];
  var famKeyMap = vehBuildFamilyMap(); // rno -> 가족키 (가족현황 탭과 동일 기준)

  // 1순위: 가족 그룹 (가족현황 탭과 동일 기준: family_id 또는 배우자성명 상호매칭)
  var famMap={};
  riders.forEach(function(d){
    var fk=famKeyMap[d.rno]||'';
    if(fk){ (famMap[fk]=famMap[fk]||[]).push(d); }
  });
  Object.keys(famMap).forEach(function(fk){
    var members=famMap[fk];
    members.forEach(function(d){ consumed[d.name.trim()]=true; });
    units.push({type:'family', members:members});
  });

  // 2순위: 사역팀 그룹 (가족으로 묶이지 않은 나머지)
  var teamMap={};
  riders.forEach(function(d){
    var n=d.name.trim();
    if(consumed[n]) return;
    var team=(d.mteam||'').trim();
    if(team && team!=='-'){ (teamMap[team]=teamMap[team]||[]).push(d); }
  });
  Object.keys(teamMap).forEach(function(team){
    var members=teamMap[team];
    members.forEach(function(d){ consumed[d.name.trim()]=true; });
    units.push({type:'team', members:members});
  });

  // 3순위: 개인 (가족·사역팀 어디에도 속하지 않은 나머지)
  riders.forEach(function(d){
    var n=d.name.trim();
    if(consumed[n]) return;
    consumed[n]=true;
    units.push({type:'individual', members:[d]});
  });

  // 메타 기록 (좌석 색상 표시용)
  units.forEach(function(u){
    u.members.forEach(function(d){
      vehMeta[d.name.trim()] = {type:u.type, team:(d.mteam||'').trim(), family_id:famKeyMap[d.rno]||''};
    });
  });

  // LPT(Longest Processing Time) 균등배분: 큰 단위부터 더 적은 쪽 버스에 배정
  units.sort(function(a,b){ return b.members.length - a.members.length; });
  var queue={1:[], 2:[]}, used={1:0, 2:0}; // queue: [{type, members:[...]}] 청크 배열 (좌석채움 단계의 가족 정렬 보정용)
  units.forEach(function(u){
    var size=u.members.length;
    var pref = used[1]<=used[2] ? 1 : 2;
    var other = pref===1 ? 2 : 1;
    if(VEH_BUS_CAP-used[pref] >= size){
      queue[pref].push({type:u.type, members:u.members}); used[pref]+=size;
    } else if(VEH_BUS_CAP-used[other] >= size){
      queue[other].push({type:u.type, members:u.members}); used[other]+=size;
    } else {
      // 두 버스 모두 통째로 못 들어가면 부득이하게 분할 배치
      var remainPref=VEH_BUS_CAP-used[pref];
      var part1=u.members.slice(0,remainPref), part2=u.members.slice(remainPref);
      if(part1.length){ queue[pref].push({type:u.type, members:part1}); used[pref]+=part1.length; }
      var remainOther=VEH_BUS_CAP-used[other];
      var part2a=part2.slice(0,remainOther);
      if(part2a.length){ queue[other].push({type:u.type, members:part2a}); used[other]+=part2a.length; }
      // 그래도 남는 인원(총 90명 초과)은 미배정으로 남음
    }
  });

  // 좌석 채우기: 가족 청크는 항상 좌석쌍(A/C) 경계에서 시작하도록 보정 → 홀수 인원 가족도 같은 줄에 모여 앉음
  [1,2].forEach(function(busNum){
    var cursor=0, backCursor=40; // 0~39: 앞좌석(A/B/C/D×10줄), 40~44: 뒷좌석
    queue[busNum].forEach(function(chunk){
      var members=chunk.members.slice();
      if(chunk.type==='family' && cursor<40 && (cursor%4===1 || cursor%4===3)){
        cursor++; // B·D 위치(짝 중간)면 한 칸 건너뛰어 A·C 경계로 정렬
      }
      while(members.length>0){
        var seatId;
        if(cursor<40){ seatId=vehSeatLayout[cursor]; cursor++; }
        else if(backCursor<45){ seatId=vehSeatLayout[backCursor]; backCursor++; }
        else break; // 좌석 부족 → 남은 인원은 미배정으로 남음
        vehData[busNum][seatId]=members.shift().name.trim();
      }
    });
  });

  renderVeh();
  vehShowToast('🔀 자동배분 완료 ('+riders.length+'명)');
  }catch(err){
    console.error('[차량배치] 자동배분 오류:', err);
    vehShowToast('❌ 자동배분 실패: '+err.message);
  }
}

function vehSeatHtml(busNum, seatId, borderSpec, extraStyle){
  var name=vehData[busNum][seatId]||'';
  extraStyle = extraStyle || '';
  if(!name){
    var placeableCls = vehPendingPlace ? ' placeable' : '';
    return '<div class="veh-seat empty'+placeableCls+'" style="'+extraStyle+'" data-bus="'+busNum+'" data-seat="'+seatId+'">·</div>';
  }
  var meta=vehMeta[name]||{type:'individual'};
  var teamAbbr = vehTeamAbbrev(meta.team);
  var teamHtml = teamAbbr ? '<span class="veh-seat-team">'+teamAbbr+'</span>' : '';
  var isSel = vehSelectedSeats.some(function(s){ return s.bus===busNum && s.seat===seatId; });
  var borderCss='';
  if(borderSpec){
    borderCss = 'border-top:'   +(borderSpec.top   ?'2px dashed #1E3A8A':'2px solid transparent')+';'
              + 'border-right:' +(borderSpec.right ?'2px dashed #1E3A8A':'2px solid transparent')+';'
              + 'border-bottom:'+(borderSpec.bottom?'2px dashed #1E3A8A':'2px solid transparent')+';'
              + 'border-left:'  +(borderSpec.left  ?'2px dashed #1E3A8A':'2px solid transparent')+';';
  }
  var tags = vehPersonTags(name); // {gender:'남'|'여'|'', isChild:bool}
  var tagParts = [];
  if(tags.gender) tagParts.push(tags.gender);
  if(tags.isChild) tagParts.push('자');
  var tagStr = tagParts.length ? ' ('+tagParts.join(',')+')' : '';
  return '<div class="veh-seat '+meta.type+(isSel?' selected':'')+'" style="'+extraStyle+borderCss+'" data-bus="'+busNum+'" data-seat="'+seatId+'" data-name="'+name+'" title="'+name+tagStr+(meta.team?' · '+meta.team:'')+'">'+teamHtml+'<span class="veh-seat-name">'+name+tagStr+'</span></div>';
}
// 명단 데이터에서 성별/자녀여부 조회
function vehPersonTags(name){
  var d=allData.find(function(x){ return x.name && x.name.trim()===name; });
  return {
    gender: d ? (d.gender||'').trim() : '',
    isChild: !!(d && (d.rel||'').trim()==='자녀')
  };
}
// 좌석 박스가 작아서 사역팀명을 줄여서 표시 (전체 이름은 title 툴팁으로 확인)
function vehTeamAbbrev(team){
  if(!team) return '';
  var t=team.replace(/팀$/,'');
  return t.length>4 ? t.slice(0,4) : t;
}
// 버스 한 대의 앞좌석(10줄×A/B/C/D)에서 같은 family_id를 가진 좌석끼리 상하좌우로 연결된 부분의
// 테두리를 계산. 맞닿은 변(이웃도 같은 가족)은 테두리 없음, 그 외 바깥쪽 변만 파선으로 표시 →
// 가로(A·B, C·D)뿐 아니라 세로(윗줄·아랫줄)로도 자연스럽게 하나의 파선 박스처럼 이어져 보임.
function vehComputeBorders(busNum){
  var famOf=function(sid){
    var n=vehData[busNum][sid]||'';
    if(!n) return null;
    var m=vehMeta[n];
    return (m&&m.family_id) ? m.family_id : null;
  };
  var borders={};
  for(var r=1;r<=10;r++){
    ['A','B','C','D'].forEach(function(col){
      var sid='R'+r+col;
      var fam=famOf(sid);
      if(!fam) return; // 가족 아님 → 테두리 없음
      var leftCol  = (col==='B')?'A':(col==='D')?'C':null;   // 통로(B-C)는 좌우 연결 대상에서 제외
      var rightCol = (col==='A')?'B':(col==='C')?'D':null;
      var leftMatch  = leftCol  && famOf('R'+r+leftCol)===fam;
      var rightMatch = rightCol && famOf('R'+r+rightCol)===fam;
      var upMatch    = r>1  && famOf('R'+(r-1)+col)===fam;
      var downMatch  = r<10 && famOf('R'+(r+1)+col)===fam;
      if(!leftMatch && !rightMatch && !upMatch && !downMatch) return; // 연결된 이웃 없음 → 테두리 없음
      borders[sid] = { top:!upMatch, right:!rightMatch, bottom:!downMatch, left:!leftMatch };
    });
  }
  return borders;
}
function vehRowHtml(busNum, r, borders){
  var cols=['A','B','C','D'];
  var h='<div class="bus-row">';
  cols.forEach(function(col){
    var sid='R'+r+col;
    var extraStyle=(col==='B')?'margin-right:8px;':'';
    h += vehSeatHtml(busNum, sid, borders[sid], extraStyle);
  });
  h+='</div>';
  return h;
}

function renderVeh(){
  var panel=document.getElementById('vehPanel');
  if(!panel) return;
  if(!currentUser||(currentUser.name!=='전태룡'&&currentUser.name!=='유원종'&&currentUser.name!=='고영수')){

    return;
  }
  if(!vehLoaded){
    vehLoaded=true;
    panel.innerHTML='<div style="padding:40px;text-align:center;color:#64748B;font-size:13px;">⏳ 차량배치 데이터를 불러오는 중…</div>';
    loadVehFromSheet();
    return;
  }

  var riders=vehGetBusRiders();
  vehEnforceFixedSeats(); // 고정석(1호차 1번=고영수) 항상 유지 — 자동배분/드래그/초기화 이후에도 적용
  var assigned=vehGetAssignedNames();
  var unassigned=riders.filter(function(d){ return !assigned[d.name.trim()]; });
  var cnt1=Object.keys(vehData[1]).filter(function(s){return vehData[1][s];}).length;
  var cnt2=Object.keys(vehData[2]).filter(function(s){return vehData[2][s];}).length;

  var h='';
  h+='<div class="veh-toolbar">';
  h+='<button class="veh-btn veh-btn-auto" onclick="vehAutoAssign()">🔀 자동배분</button>';
  h+='<button class="veh-btn veh-btn-undo" onclick="vehUndo()"'+(vehHistory.length?'':' disabled')+'>↩ 되돌리기</button>';
  h+='<button class="veh-btn veh-btn-reset" onclick="vehReset()">🔄 초기화</button>';
  h+='<button class="veh-btn veh-btn-group'+(vehGroupMode?' active':'')+'" onclick="vehToggleGroupMode()">'+(vehGroupMode?'✖ 선택모드 종료':'👨\u200d👩\u200d👧 가족묶기')+'</button>';
  h+='<button class="veh-btn veh-btn-save" onclick="vehSave()">💾 저장</button>';
  h+='<button class="veh-btn veh-btn-excel" onclick="vehExportExcel()">📥 엑셀</button>';
  h+='<span class="veh-version">'+VEH_VERSION+'</span>';
  h+='</div>';

  h+='<div class="veh-summary">';
  h+='<div class="veh-sum-chip">🚌 총 버스탑승 '+riders.length+'명</div>';
  h+='<div class="veh-sum-chip">1호차 '+cnt1+'/'+VEH_BUS_CAP+'</div>';
  h+='<div class="veh-sum-chip">2호차 '+cnt2+'/'+VEH_BUS_CAP+'</div>';
  if(unassigned.length) h+='<div class="veh-sum-chip warn">⚠ 미배정 '+unassigned.length+'명</div>';
  h+='</div>';

  h+='<div class="veh-legend">'
   +'<span><i style="background:#DBEAFE"></i>가족</span>'
   +'<span><i style="background:#DCFCE7"></i>사역팀</span>'
   +'<span><i style="background:#FEF3C7"></i>개인</span>'
   +'</div>';
  h+='<div style="font-size:10px;color:#94A3B8;margin-bottom:10px;">💡 좌석을 <b>길게 눌러서</b> 다른 좌석으로 끌어놓으면 자리가 바뀝니다. (짧게 탭하면 반응 없음)</div>';
  if(vehGroupMode){
    h+='<div style="font-size:10px;color:#1E3A8A;background:#EFF6FF;border:1px solid #DBEAFE;border-radius:8px;padding:8px 10px;margin-bottom:10px;">👨\u200d👩\u200d👧 <b>가족묶기 선택모드</b> — 좌석을 탭해서 2명 이상 선택한 뒤 아래 버튼으로 묶거나 해체하세요.</div>';
  }

  [1,2].forEach(function(busNum){
    var cnt=busNum===1?cnt1:cnt2;
    var borders=vehComputeBorders(busNum);
    var gs=vehBusGenderStats(busNum);
    h+='<div class="bus-block">';
    h+='<div class="bus-title"><span>🚌 '+busNum+'호차</span><span class="bus-title-cnt">'+cnt+' / '+VEH_BUS_CAP+'명</span></div>';
    h+='<div class="bus-gender-stats">탑승인원 '+gs.total+' / '+VEH_BUS_CAP+'명 · 남성 '+gs.male+'명 · 여성 '+gs.female+'명 · 자녀 '+gs.child+'명</div>';
    h+='<div class="bus-front">🚪 출입구 · 🧑\u200d✈️ 기사석</div>';
    h+='<div class="bus-grid">';
    for(var r=1;r<=10;r++){ h+=vehRowHtml(busNum, r, borders); }
    h+='</div>';
    h+='<div class="bus-back-row">';
    vehSeatLayout.slice(40).forEach(function(seatId){ h+=vehSeatHtml(busNum, seatId); });
    h+='</div>';
    h+='</div>';
  });

  if(unassigned.length){
    h+='<div class="veh-unassigned"><div class="veh-unassigned-title">⚠ 미배정 인원 ('+unassigned.length+'명) <span style="font-weight:400;color:#94A3B8;">— 탭해서 좌석에 배치</span></div><div class="veh-unassigned-chips">';
    unassigned.forEach(function(d){
      var nm=d.name;
      var picked=(vehPendingPlace===nm);
      h+='<span class="veh-unassigned-chip'+(picked?' picked':'')+'" onclick="vehSelectUnassignedChip(\''+nm.replace(/'/g,"\\'")+'\')">'+nm+(d.mteam&&d.mteam!=='-'?' · '+d.mteam:'')+'</span>';
    });
    h+='</div></div>';
  }
  if(vehPendingPlace){
    h+='<div class="veh-place-bar">🎯 <b>'+vehPendingPlace+'</b>님을 배치할 빈 좌석을 탭하세요 <button class="veh-place-cancel" onclick="vehCancelPlace()">취소</button></div>';
  }

  h+='<div id="vehToast"></div>';
  if(vehGroupMode && vehSelectedSeats.length>0){
    h+='<div class="veh-group-bar">';
    h+='<span class="veh-group-cnt">'+vehSelectedSeats.length+'명 선택됨</span>';
    h+='<button class="veh-group-btn veh-group-confirm" onclick="vehConfirmGroup()">👨\u200d👩\u200d👧 가족으로 묶기</button>';
    h+='<button class="veh-group-btn veh-group-dissolve" onclick="vehDissolveGroup()">✂️ 해체</button>';
    h+='<button class="veh-group-btn veh-group-cancel" onclick="vehClearSelection()">✕ 선택취소</button>';
    h+='</div>';
  }
  panel.innerHTML=h;
  bindVehDrag();
}

// ── 서버(구글시트 '차량배치') 불러오기/저장 ──
function loadVehFromSheet(){
  if(!currentUser){ renderVeh(); return; }
  var pw=currentUser.name+':'+currentUser.phone;
  fetch(GAS_URL+'?action=getVehicleData&pw='+encodeURIComponent(pw))
    .then(function(r){ return r.json(); })
    .then(function(j){
      if(j.result==='ok' && j.seats && j.seats.length){
        vehData={1:{},2:{}}; vehMeta={};
        j.seats.forEach(function(s){
          if((s.bus===1||s.bus===2) && s.seat){
            vehData[s.bus][s.seat]=s.name||'';
            if(s.name){
              // 저장된 family_id/team을 그대로 복원 (수동으로 묶은 그룹도 유지됨)
              vehMeta[s.name]={
                type: s.family_id ? 'family' : (s.team && s.team!=='-' ? 'team' : 'individual'),
                team: s.team||'',
                family_id: s.family_id||''
              };
            }
          }
        });
      }
      renderVeh();
    })
    .catch(function(){ renderVeh(); }); // 저장된 데이터 없음/오류 → 빈 상태로 표시, 자동배분 유도
}
// 실제 저장 로직 (UI 요소에 의존하지 않음) — vehSave()와 엑셀 내보내기 양쪽에서 재사용
function vehSaveCore(onDone){
  var seats=[];
  [1,2].forEach(function(b){
    vehSeatLayout.forEach(function(seatId){
      var name=vehData[b][seatId]||'';
      if(name){
        var meta=vehMeta[name]||{};
        seats.push({bus:b, seat:seatId, name:name, type:meta.type||'', team:meta.team||'', family_id:meta.family_id||''});
      }
    });
  });
  var pw=currentUser.name+':'+currentUser.phone;
  fetch(GAS_URL,{method:'POST',headers:{'Content-Type':'application/x-www-form-urlencoded'},
    body:'data='+encodeURIComponent(JSON.stringify({action:'saveVehicleAssign', pw:pw, seats:seats}))
  }).then(function(r){ return r.json(); })
  .then(function(j){ onDone(j.result==='ok', j.message||''); })
  .catch(function(){ onDone(false, '네트워크 오류'); });
}
function vehSave(){
  var btn=document.querySelector('.veh-btn-save');
  if(btn){ btn.textContent='저장 중...'; btn.disabled=true; }
  vehSaveCore(function(ok, msg){
    if(ok){ vehHistory=[]; if(typeof renderVeh==='function') renderVeh(); vehShowToast('💾 구글시트 저장 완료!'); }
    else vehShowToast('❌ 저장 실패: '+msg);
    if(btn){ btn.textContent='💾 저장'; btn.disabled=false; }
  });
}

// ── 드래그&드롭 좌석 교체 (마우스+터치, 숙소배치와 동일한 방식) ──
function createVehGhost(){
  var g=document.getElementById('vehGhost');
  if(g) return g;
  g=document.createElement('div'); g.id='vehGhost';
  document.body.appendChild(g);
  return g;
}
function bindVehDrag(){
  if(!document.getElementById('vehGhost')) createVehGhost();
  document.querySelectorAll('.veh-seat.empty').forEach(function(seat){
    seat.addEventListener('click', function(){
      if(!vehPendingPlace) return;
      vehPlaceInSeat(Number(seat.dataset.bus), seat.dataset.seat);
    });
  });
  if(vehGroupMode){
    document.querySelectorAll('.veh-seat[data-name]').forEach(function(seat){
      seat.addEventListener('click', vehSeatTap);
    });
    return;
  }
  document.querySelectorAll('.veh-seat[data-name]').forEach(function(seat){
    seat.addEventListener('mousedown', vehMouseDown);
    seat.addEventListener('touchstart', vehTouchStart, {passive:true});
  });
}
function vehSeatTap(e){
  var seatEl=e.currentTarget;
  var bus=Number(seatEl.dataset.bus), seat=seatEl.dataset.seat, name=seatEl.dataset.name;
  var idx=vehSelectedSeats.findIndex(function(s){ return s.bus===bus && s.seat===seat; });
  if(idx>=0) vehSelectedSeats.splice(idx,1);
  else vehSelectedSeats.push({bus:bus, seat:seat, name:name});
  renderVeh();
}
function vehToggleGroupMode(){
  vehGroupMode=!vehGroupMode;
  vehSelectedSeats=[];
  renderVeh();
}
function vehClearSelection(){
  vehSelectedSeats=[];
  renderVeh();
}
function vehConfirmGroup(){
  if(vehSelectedSeats.length<2){ vehShowToast('⚠️ 2명 이상 선택해주세요.'); return; }
  if(vehSelectedSeats.length>4){ vehShowToast('⚠️ 한 번에 최대 4명까지 묶을 수 있습니다.'); return; }
  var gid='MG-'+Date.now();
  var names=[];
  vehSelectedSeats.forEach(function(s){
    if(!vehMeta[s.name]) vehMeta[s.name]={type:'individual', team:'', family_id:''};
    vehMeta[s.name].family_id=gid;
    vehMeta[s.name].type='family';
    names.push(s.name);
  });
  var connected = vehIsGroupConnected(vehSelectedSeats.slice());
  vehSelectedSeats=[];
  renderVeh();
  if(connected){
    vehShowToast('👨\u200d👩\u200d👧 '+names.join(', ')+' 가족으로 묶었습니다.');
  } else {
    vehShowToast('👨\u200d👩\u200d👧 '+names.join(', ')+' 가족으로 묶었습니다. (자리가 떨어져 있어 파선은 표시되지 않아요 — 드래그로 붙여 앉히면 파선이 나타납니다)');
  }
}
// 선택된 인원이 상하좌우로 실제 서로 연결되어 있는지(파선이 보일지) 확인
function vehIsGroupConnected(selected){
  if(selected.length<2) return false;
  var bus=selected[0].bus;
  if(!selected.every(function(s){ return s.bus===bus; })) return false; // 서로 다른 버스면 연결 불가
  var borders=vehComputeBorders(bus);
  return selected.every(function(s){ return !!borders[s.seat]; });
}
function vehDissolveGroup(){
  if(!vehSelectedSeats.length){ vehShowToast('⚠️ 해체할 좌석을 선택해주세요.'); return; }
  var names=[];
  vehSelectedSeats.forEach(function(s){
    if(vehMeta[s.name]){
      vehMeta[s.name].family_id='';
      vehMeta[s.name].type=(vehMeta[s.name].team && vehMeta[s.name].team!=='-')?'team':'individual';
      names.push(s.name);
    }
  });
  vehSelectedSeats=[];
  renderVeh();
  vehShowToast('✂️ '+names.join(', ')+' 가족 관계를 해체했습니다.');
}
function vehMouseDown(e){
  if(e.button!==0) return;
  vehStartDrag(e.currentTarget, e.clientX, e.clientY);
  document.addEventListener('mousemove', vehMouseMove);
  document.addEventListener('mouseup', vehMouseUp);
  e.preventDefault();
}
function vehMouseMove(e){ vehMoveDrag(e.clientX, e.clientY); }
function vehMouseUp(e){
  vehEndDrag(e.clientX, e.clientY);
  document.removeEventListener('mousemove', vehMouseMove);
  document.removeEventListener('mouseup', vehMouseUp);
}
var vehLongPressTimer=null, vehTouchStartX=0, vehTouchStartY=0, vehLongPressSeat=null;
var VEH_LONG_PRESS_MS=350, VEH_MOVE_THRESHOLD=8;
function vehTouchStart(e){
  var t=e.touches[0];
  vehTouchStartX=t.clientX; vehTouchStartY=t.clientY;
  vehLongPressSeat=e.currentTarget;
  vehLongPressSeat.classList.add('pressing');
  vehLongPressTimer=setTimeout(function(){
    vehLongPressTimer=null;
    vehLongPressSeat.classList.remove('pressing');
    if(navigator.vibrate) navigator.vibrate(30);
    vehStartDrag(vehLongPressSeat, vehTouchStartX, vehTouchStartY);
    document.addEventListener('touchmove', vehTouchMove, {passive:false});
    document.addEventListener('touchend', vehTouchEnd);
  }, VEH_LONG_PRESS_MS);
  document.addEventListener('touchmove', vehTouchStartMove, {passive:true});
  document.addEventListener('touchend', vehTouchStartEnd, {once:true});
}
function vehTouchStartMove(e){
  if(!vehLongPressTimer) return;
  var t=e.touches[0];
  if(Math.abs(t.clientX-vehTouchStartX)>VEH_MOVE_THRESHOLD || Math.abs(t.clientY-vehTouchStartY)>VEH_MOVE_THRESHOLD){
    clearTimeout(vehLongPressTimer); vehLongPressTimer=null;
    if(vehLongPressSeat) vehLongPressSeat.classList.remove('pressing');
    document.removeEventListener('touchmove', vehTouchStartMove);
  }
}
function vehTouchStartEnd(){
  clearTimeout(vehLongPressTimer); vehLongPressTimer=null;
  if(vehLongPressSeat) vehLongPressSeat.classList.remove('pressing');
  document.removeEventListener('touchmove', vehTouchStartMove);
}
function vehTouchMove(e){
  if(!vehDragging) return;
  vehMoveDrag(e.touches[0].clientX, e.touches[0].clientY);
  e.preventDefault();
}
function vehTouchEnd(e){
  var t=e.changedTouches[0];
  vehEndDrag(t.clientX, t.clientY);
  document.removeEventListener('touchmove', vehTouchMove);
  document.removeEventListener('touchend', vehTouchEnd);
  document.removeEventListener('touchmove', vehTouchStartMove);
}
function vehStartDrag(seatEl, x, y){
  vehDragging={name:seatEl.dataset.name, fromBus:Number(seatEl.dataset.bus), fromSeat:seatEl.dataset.seat, el:seatEl};
  seatEl.classList.add('dragging');
  var g=createVehGhost();
  g.textContent=seatEl.dataset.name;
  g.style.display='block';
  g.style.left=x+'px'; g.style.top=y+'px';
}
function vehMoveDrag(x,y){
  if(!vehDragging) return;
  var g=document.getElementById('vehGhost');
  if(g){ g.style.left=x+'px'; g.style.top=y+'px'; g.style.display='none'; }
  var el=document.elementFromPoint(x,y);
  if(g) g.style.display='block';
  var seat=el?el.closest('.veh-seat'):null;
  if(vehOverSeat && vehOverSeat!==seat) vehOverSeat.classList.remove('drag-over');
  if(seat && seat!==vehDragging.el){ seat.classList.add('drag-over'); vehOverSeat=seat; }
  else vehOverSeat=null;
}
function vehEndDrag(x,y){
  if(!vehDragging){ var g=document.getElementById('vehGhost'); if(g) g.style.display='none'; return; }
  var g=document.getElementById('vehGhost'); if(g) g.style.display='none';
  if(vehOverSeat) vehOverSeat.classList.remove('drag-over');
  var el=document.elementFromPoint(x,y);
  var targetSeat=el?el.closest('.veh-seat'):null;
  vehDragging.el.classList.remove('dragging');
  if(targetSeat && targetSeat!==vehDragging.el){
    var toBus=Number(targetSeat.dataset.bus), toSeat=targetSeat.dataset.seat;
    vehDoSwap(vehDragging.name, vehDragging.fromBus, vehDragging.fromSeat, toBus, toSeat);
  }
  vehDragging=null; vehOverSeat=null;
}
// ── 미배정 인원 칩 탭 → 빈 좌석 탭으로 배치 ──
function vehSelectUnassignedChip(name){
  vehPendingPlace = (vehPendingPlace===name) ? null : name;
  renderVeh();
}
function vehCancelPlace(){
  vehPendingPlace = null;
  renderVeh();
}
function vehPlaceInSeat(bus, seatId){
  var name = vehPendingPlace;
  if(!name) return;
  if(vehData[bus][seatId]){ vehShowToast('⚠️ 이미 배정된 좌석입니다.'); return; }
  if(!vehMeta[name]){
    var d = allData.find(function(x){ return x.name && x.name.trim()===name; });
    var fk = d ? (vehBuildFamilyMap()[d.rno]||'') : '';
    var team = d ? (d.mteam||'').trim() : '';
    vehMeta[name] = { type: fk?'family':(team&&team!=='-'?'team':'individual'), team:team, family_id:fk };
  }
  vehData[bus][seatId] = name;
  vehHistory.push({name:name, fromBus:null, fromSeat:null, toBus:bus, toSeat:seatId, swappedName:''});
  vehPendingPlace = null;
  renderVeh();
  vehShowToast('✅ '+name+' → '+bus+'호차 '+seatId+' 배치완료');
}
function vehDoSwap(name, fromBus, fromSeat, toBus, toSeat){
  var targetName = vehData[toBus][toSeat] || '';
  vehData[toBus][toSeat] = name;
  vehData[fromBus][fromSeat] = targetName;
  vehHistory.push({name:name, fromBus:fromBus, fromSeat:fromSeat, toBus:toBus, toSeat:toSeat, swappedName:targetName});
  renderVeh();
  vehShowToast(targetName ? ('🔀 '+name+' ↔ '+targetName+' 자리 교체') : ('✅ '+name+' → '+toBus+'호차 '+toSeat));
}
function vehUndo(){
  if(!vehHistory.length) return;
  var last=vehHistory.pop();
  if(last.fromBus==null){
    // 미배정 인원을 좌석에 배치했던 것을 되돌림 → 그 좌석만 비움
    vehData[last.toBus][last.toSeat] = '';
  } else {
    vehData[last.fromBus][last.fromSeat]=last.name;
    vehData[last.toBus][last.toSeat]=last.swappedName||'';
  }
  renderVeh();
  vehShowToast('↩ 되돌리기');
}
function vehReset(){
  var ok=true;
  try{ ok=confirm('모든 차량배치를 초기화하시겠습니까?'); }catch(e){ ok=true; }
  if(!ok) return;
  vehData={1:{},2:{}}; vehHistory=[]; vehMeta={}; vehGroupMode=false; vehSelectedSeats=[]; vehPendingPlace=null;
  renderVeh();
  vehShowToast('🔄 초기화 완료');
}

// ── 엑셀 저장 ──
function vehExportExcel(){
  if(typeof XLSX==='undefined'){
    var s=document.createElement('script');
    s.src='https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js';
    s.onload=function(){ _doVehExcel(); };
    s.onerror=function(){ alert('엑셀 라이브러리 로드 실패'); };
    document.head.appendChild(s);
  } else { _doVehExcel(); }
}
function _doVehExcel(){
  var phoneByName={};
  allData.forEach(function(d){
    var nm=(d.name||'').trim();
    if(nm && !phoneByName[nm]) phoneByName[nm]=d.phone||'';
  });
  var rows=[];
  [1,2].forEach(function(b){
    vehSeatLayout.forEach(function(seatId){
      var name=vehData[b][seatId]||'';
      var meta=vehMeta[name]||{};
      rows.push({
        '호차': b+'호차',
        '좌석': seatId,
        '이름': name,
        '전화번호': name?(phoneByName[name]||''):'',
        '구분': meta.type==='family'?'가족':meta.type==='team'?'사역팀':(name?'개인':''),
        '사역팀': meta.team||''
      });
    });
  });
  var ws=XLSX.utils.json_to_sheet(rows);
  var wb=XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, ws, '차량배치');
  var now=new Date();
  var stamp=now.getFullYear()+String(now.getMonth()+1).padStart(2,'0')+String(now.getDate()).padStart(2,'0')+'_'+String(now.getHours()).padStart(2,'0')+String(now.getMinutes()).padStart(2,'0');
  XLSX.writeFile(wb, 'MET2026_삼척차량배치_'+stamp+'.xlsx');
  vehShowToast('📊 엑셀 저장 완료');
}
function vehShowToast(msg){
  var el=document.getElementById('vehToast');
  if(!el) return;
  el.textContent=msg; el.classList.add('show');
  clearTimeout(vehToastTimer);
  vehToastTimer=setTimeout(function(){ el.classList.remove('show'); },2200);
}

</script>
